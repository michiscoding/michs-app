<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="css/style.css">
    <title>projects</title>
    <link rel="manifest" href="manifest.json">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="michi">
    <style>
        #title-input {
            width: 100%;
            background: none;
            border: none;
            border-bottom: 1px solid #ccc;
            outline: none;
            font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", "Noto Sans", "Liberation Sans", Arial, sans-serif;
            font-size: 2.5rem;
            font-weight: 500;
            color: #111;
            padding: 0 0 0.4rem 0;
            margin-bottom: 1.5rem;
        }
        #title-input::placeholder { color: #ccc; font-weight: 400; }
        body.dark #title-input { color: #eee; border-bottom-color: #444; }
        body.dark #title-input::placeholder { color: #555; }

        .text-toolbar {
            display: flex;
            gap: 0.4rem;
            margin-bottom: 0.4rem;
        }
        .toolbar-btn {
            background: none;
            border: 1px solid #ddd;
            border-radius: 4px;
            padding: 0.2rem 0.65rem;
            font-size: 0.72rem;
            font-family: inherit;
            font-weight: 600;
            letter-spacing: 0.03em;
            color: #999;
            cursor: pointer;
            transition: color 0.15s, border-color 0.15s;
        }
        .toolbar-btn:hover { color: #333; border-color: #aaa; }
        body.dark .toolbar-btn { border-color: #333; color: #666; }
        body.dark .toolbar-btn:hover { color: #ccc; border-color: #666; }

        .link-popup {
            display: none;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 0.6rem;
            flex-wrap: wrap;
        }
        .link-popup input {
            border: none;
            border-bottom: 1px solid #ddd;
            background: none;
            outline: none;
            font-family: inherit;
            font-size: 0.85rem;
            padding: 0.2rem 0;
            color: #333;
            flex: 1;
            min-width: 80px;
        }
        body.dark .link-popup input { border-bottom-color: #444; color: #ccc; }
        .link-popup-insert {
            background: #222;
            color: #fff;
            border: none;
            border-radius: 4px;
            padding: 0.25rem 0.7rem;
            font-family: inherit;
            font-size: 0.75rem;
            font-weight: 600;
            cursor: pointer;
        }
        .link-popup-cancel {
            background: none;
            border: none;
            color: #bbb;
            cursor: pointer;
            font-size: 1.1rem;
            line-height: 1;
            padding: 0;
        }
        .link-popup-cancel:hover { color: #555; }

        .attach-section { margin-top: 1rem; }
        .attach-file-row {
            display: flex; align-items: center; gap: 0.5rem;
            font-size: 0.8rem; color: #666; margin-top: 0.5rem;
        }
        .attach-file-name { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .attach-status { font-size: 0.7rem; color: #bbb; white-space: nowrap; }
        .attach-insert-btn {
            background: none; border: 1px solid #ddd; border-radius: 4px;
            padding: 0.15rem 0.55rem; font-size: 0.7rem; font-family: inherit;
            font-weight: 600; color: #888; cursor: pointer; white-space: nowrap;
        }
        .attach-insert-btn:hover { color: #111; border-color: #aaa; }
        .attach-remove-btn {
            background: none; border: none; color: #ccc;
            cursor: pointer; font-size: 1rem; line-height: 1; padding: 0; flex-shrink: 0;
        }
        .attach-remove-btn:hover { color: #555; }
        #attach-input { display: none; }
        #attach-pick-btn { margin-top: 0.5rem; }
        #attach-upload-btn { margin-top: 0.5rem; display: none; }
        #post-btn { margin-top: 1.5rem; }

        .mode-tabs {
            display: flex;
            gap: 1.5rem;
            margin-bottom: 1.5rem;
        }
        .mode-tab {
            background: none;
            border: none;
            padding: 0;
            font-family: inherit;
            font-size: 0.8rem;
            font-weight: 600;
            letter-spacing: 0.05em;
            color: #bbb;
            cursor: pointer;
            outline: none;
        }
        .mode-tab.active { color: #222; }
        body.dark .mode-tab { color: #555; }
        body.dark .mode-tab.active { color: #eee; }

        #reorder-list { display: flex; flex-direction: column; gap: 0.15rem; }
        .reorder-item {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.6rem 0;
            border-bottom: 1px solid #f0f0f0;
            cursor: grab;
            user-select: none;
            transition: background 0.1s;
        }
        body.dark .reorder-item { border-bottom-color: #222; }
        .reorder-item:active { cursor: grabbing; }
        .reorder-item.dragging { opacity: 0.4; }
        .reorder-item.drag-over { border-top: 2px solid #888; }
        .drag-handle {
            color: #ccc;
            font-size: 0.9rem;
            flex-shrink: 0;
            line-height: 1;
        }
        body.dark .drag-handle { color: #444; }
        .reorder-title {
            font-size: 0.85rem;
            font-weight: 500;
            color: #333;
            flex: 1;
        }
        body.dark .reorder-title { color: #ccc; }
        #save-order-btn { margin-top: 1.25rem; }
    </style>
</head>

<body>

    <div class="top-bar">
      <a href="https://michiscoding.github.io/home.html" id="site-link" aria-label="go to site">
        <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
          <circle cx="12" cy="12" r="3"/>
        </svg>
      </a>
      <button type="button" id="burger-btn" class="burger-btn" aria-label="menu">
        <svg id="burger-icon" xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
          <line x1="3" y1="6" x2="21" y2="6"/>
          <line x1="3" y1="12" x2="21" y2="12"/>
          <line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
        <svg id="close-icon" xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
          <line x1="4" y1="4" x2="20" y2="20"/>
          <line x1="20" y1="4" x2="4" y2="20"/>
        </svg>
      </button>
    </div>
    <nav class="nav-menu">
        <ul>
            <li><a href="entry.html">entry</a></li>
            <li><a href="visuals.html">visuals</a></li>
            <li><span class="nav-toggle" id="work-toggle">work</span>
                <ul class="nav-sub" id="work-sub">
                    <li><a href="powerapps-new.html">powerapps</a></li>
                    <li><a href="writings.html">projects</a></li>
                </ul>
            </li>
            <li><a href="edit.html">edit</a></li>
            <li><a href="media.html">media</a></li>
            <li><button type="button" id="dark-toggle" aria-label="toggle dark mode"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg></button></li>
        </ul>
    </nav>

    <div class="entry-container">
        <div class="mode-tabs">
            <button type="button" class="mode-tab active" data-mode="new">new</button>
            <button type="button" class="mode-tab" data-mode="reorder">reorder</button>
        </div>

        <div id="new-form">
        <input type="text" id="title-input" placeholder="title" autocomplete="off">

        <div class="text-toolbar">
            <button type="button" class="toolbar-btn" id="link-btn">link ↗</button>
        </div>
        <div class="link-popup" id="link-popup">
            <input type="text" id="lp-text" placeholder="link text">
            <input type="text" id="lp-url" placeholder="url or /path">
            <button type="button" class="link-popup-insert" id="lp-insert">insert</button>
            <button type="button" class="link-popup-cancel" id="lp-cancel">×</button>
        </div>
        <textarea id="main-textarea" placeholder="write here..."></textarea>

        <div class="attach-section">
            <input type="file" id="attach-input" multiple>
            <div id="attach-list"></div>
            <button type="button" class="toolbar-btn" id="attach-pick-btn">+ attach files</button>
            <button type="button" class="toolbar-btn" id="attach-upload-btn">upload</button>
        </div>

        <button type="button" id="post-btn" class="btn-app">post</button>
        </div>

        <div id="reorder-view" style="display:none;">
            <div id="reorder-list"></div>
            <button type="button" id="save-order-btn" class="btn-app">save order</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>
    <script src="js/app.js"></script>
    <script>
        const textarea = document.getElementById('main-textarea');

        textarea.addEventListener('input', () => {
            if (textarea.scrollHeight > textarea.clientHeight) textarea.style.height = textarea.scrollHeight + 'px';
        });

        // link helper
        const linkPopup = document.getElementById('link-popup');
        const lpText = document.getElementById('lp-text');
        const lpUrl = document.getElementById('lp-url');

        document.getElementById('link-btn').addEventListener('click', () => {
            const sel = textarea.value.substring(textarea.selectionStart, textarea.selectionEnd);
            lpText.value = sel;
            lpUrl.value = '';
            linkPopup.style.display = linkPopup.style.display === 'flex' ? 'none' : 'flex';
            if (linkPopup.style.display === 'flex') (sel ? lpUrl : lpText).focus();
        });

        document.getElementById('lp-cancel').addEventListener('click', () => { linkPopup.style.display = 'none'; });

        function insertLink() {
            const text = lpText.value || 'link';
            const url = lpUrl.value.trim();
            if (!url) { lpUrl.focus(); return; }
            const md = `[${text}](${url})`;
            const start = textarea.selectionStart;
            const end = textarea.selectionEnd;
            textarea.value = textarea.value.substring(0, start) + md + textarea.value.substring(end);
            textarea.selectionStart = textarea.selectionEnd = start + md.length;
            linkPopup.style.display = 'none';
            textarea.focus();
        }

        document.getElementById('lp-insert').addEventListener('click', insertLink);
        lpUrl.addEventListener('keydown', e => { if (e.key === 'Enter') insertLink(); if (e.key === 'Escape') linkPopup.style.display = 'none'; });
        lpText.addEventListener('keydown', e => { if (e.key === 'Escape') linkPopup.style.display = 'none'; });

        // attachment upload
        let stagedFiles = [];
        let uploadedFiles = []; // { file, url }

        document.getElementById('attach-pick-btn').addEventListener('click', () => document.getElementById('attach-input').click());

        document.getElementById('attach-input').addEventListener('change', e => {
            Array.from(e.target.files).forEach(f => stagedFiles.push(f));
            e.target.value = '';
            renderAttachList();
        });

        document.getElementById('attach-upload-btn').addEventListener('click', async () => {
            const title = document.getElementById('title-input').value.trim();
            if (!title) { document.getElementById('title-input').focus(); return; }
            if (!stagedFiles.length) return;
            const btn = document.getElementById('attach-upload-btn');
            btn.textContent = 'uploading...'; btn.disabled = true;
            const slug = slugify(title);
            for (const f of [...stagedFiles]) {
                const isHtml = /\.html?$/i.test(f.name);
                let url = null;
                if (isHtml) {
                    url = await uploadToGitHub(f, slug);
                } else {
                    const adminDb = await getAdminClient();
                    if (adminDb) {
                        const path = `attachments/${slug}/${f.name}`;
                        const { error } = await adminDb.storage.from('media').upload(path, f, { upsert: true, contentType: mimeType(f) });
                        if (!error) url = `${SUPABASE_URL}/storage/v1/object/public/media/${path}`;
                    }
                }
                if (url) {
                    uploadedFiles.push({ file: f, url });
                    stagedFiles = stagedFiles.filter(x => x !== f);
                }
            }
            btn.textContent = 'upload'; btn.disabled = false;
            renderAttachList();
        });

        function insertAttachLink(item) {
            const md = `[here](${item.url})`;
            const start = textarea.selectionStart;
            const end = textarea.selectionEnd;
            textarea.value = textarea.value.substring(0, start) + md + textarea.value.substring(end);
            textarea.selectionStart = textarea.selectionEnd = start + md.length;
            textarea.focus();
        }

        function renderAttachList() {
            const list = document.getElementById('attach-list');
            list.innerHTML = '';
            stagedFiles.forEach((f, i) => {
                const row = document.createElement('div');
                row.className = 'attach-file-row';
                row.innerHTML = `<span class="attach-file-name">${f.name}</span><span class="attach-status">pending</span><button type="button" class="attach-remove-btn">×</button>`;
                row.querySelector('.attach-remove-btn').addEventListener('click', () => { stagedFiles.splice(i, 1); renderAttachList(); });
                list.appendChild(row);
            });
            uploadedFiles.forEach((item, i) => {
                const row = document.createElement('div');
                row.className = 'attach-file-row';
                row.innerHTML = `<span class="attach-file-name">${item.file.name}</span><button type="button" class="attach-insert-btn">insert link</button><button type="button" class="attach-remove-btn">×</button>`;
                row.querySelector('.attach-insert-btn').addEventListener('click', () => insertAttachLink(item));
                row.querySelector('.attach-remove-btn').addEventListener('click', () => { uploadedFiles.splice(i, 1); renderAttachList(); });
                list.appendChild(row);
            });
            document.getElementById('attach-upload-btn').style.display = stagedFiles.length ? 'inline-block' : 'none';
        }

        function mimeType(file) {
            if (file.type) return file.type;
            const ext = file.name.split('.').pop().toLowerCase();
            return { html: 'text/html', htm: 'text/html', pdf: 'application/pdf', png: 'image/png', jpg: 'image/jpeg', jpeg: 'image/jpeg', gif: 'image/gif', svg: 'image/svg+xml', webp: 'image/webp' }[ext] || 'application/octet-stream';
        }

        function slugify(str) {
            return str.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)/g, '');
        }

        const GH_OWNER = 'michiscoding';
        const GH_REPO = 'michiscoding.github.io';
        const GH_BRANCH = 'main';

        function getGhToken() {
            let token = localStorage.getItem('gh_token');
            if (!token) {
                token = prompt('enter your github token (for file uploads):');
                if (token) localStorage.setItem('gh_token', token);
            }
            return token;
        }

        async function uploadToGitHub(file, slug) {
            const token = getGhToken();
            if (!token) return null;
            const path = `reports/${slug}/${file.name}`;
            const content = await new Promise(resolve => {
                const reader = new FileReader();
                reader.onload = e => resolve(e.target.result.split(',')[1]);
                reader.readAsDataURL(file);
            });
            const checkRes = await fetch(`https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/contents/${path}`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const existing = checkRes.ok ? await checkRes.json() : null;
            const body = { message: `upload ${file.name}`, content, branch: GH_BRANCH };
            if (existing?.sha) body.sha = existing.sha;
            const res = await fetch(`https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/contents/${path}`, {
                method: 'PUT',
                headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
                body: JSON.stringify(body)
            });
            return res.ok ? `/${path}` : null;
        }

        // mode tabs
        let reorderLoaded = false;
        document.querySelectorAll('.mode-tab').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.mode-tab').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                const mode = btn.dataset.mode;
                document.getElementById('new-form').style.display = mode === 'new' ? '' : 'none';
                document.getElementById('reorder-view').style.display = mode === 'reorder' ? '' : 'none';
                if (mode === 'reorder' && !reorderLoaded) { reorderLoaded = true; loadReorderList(); }
            });
        });

        let dragSrc = null;
        async function loadReorderList() {
            const adminDb = await getAdminClient();
            if (!adminDb) return;
            const { data } = await adminDb.from('research').select('id, slug, title, sort_order').order('sort_order', { ascending: true });
            renderReorderList(data || []);
        }

        function renderReorderList(rows) {
            const list = document.getElementById('reorder-list');
            list.innerHTML = '';
            rows.forEach(row => {
                const item = document.createElement('div');
                item.className = 'reorder-item';
                item.draggable = true;
                item.dataset.id = row.id;
                item.innerHTML = `<span class="drag-handle">⠿</span><span class="reorder-title">${row.title}</span>`;
                item.addEventListener('dragstart', e => { dragSrc = item; item.classList.add('dragging'); e.dataTransfer.effectAllowed = 'move'; });
                item.addEventListener('dragend', () => { item.classList.remove('dragging'); list.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over')); });
                item.addEventListener('dragover', e => { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; if (item !== dragSrc) item.classList.add('drag-over'); });
                item.addEventListener('dragleave', () => item.classList.remove('drag-over'));
                item.addEventListener('drop', e => {
                    e.preventDefault();
                    item.classList.remove('drag-over');
                    if (!dragSrc || dragSrc === item) return;
                    const items = [...list.querySelectorAll('.reorder-item')];
                    const fromIdx = items.indexOf(dragSrc);
                    const toIdx = items.indexOf(item);
                    if (fromIdx < toIdx) item.after(dragSrc); else item.before(dragSrc);
                });
                list.appendChild(item);
            });
        }

        document.getElementById('save-order-btn').addEventListener('click', async () => {
            const btn = document.getElementById('save-order-btn');
            const adminDb = await getAdminClient();
            if (!adminDb) return;
            const items = document.querySelectorAll('.reorder-item');
            const updates = [...items].map((el, i) => ({ id: el.dataset.id, sort_order: i }));
            btn.textContent = 'saving...'; btn.disabled = true;
            const { error } = await adminDb.from('research').upsert(updates, { onConflict: 'id' });
            if (error) { btn.textContent = 'error'; setTimeout(() => { btn.textContent = 'save order'; btn.disabled = false; }, 2000); return; }
            btn.textContent = 'saved!';
            setTimeout(() => { btn.textContent = 'save order'; btn.disabled = false; }, 1500);
        });

        document.getElementById('post-btn').addEventListener('click', async () => {
            const title = document.getElementById('title-input').value.trim();
            if (!title) { document.getElementById('title-input').focus(); return; }

            const adminDb = await getAdminClient();
            if (!adminDb) return;

            const btn = document.getElementById('post-btn');
            btn.textContent = 'posting...';

            const slug = slugify(title);
            const attachmentUrl = uploadedFiles.find(u => /\.(html|htm|pdf)$/i.test(u.file.name))?.url
                || uploadedFiles[0]?.url
                || null;

            const { error } = await adminDb.from('research').upsert(
                { slug, title, body: textarea.value, attachment_url: attachmentUrl },
                { onConflict: 'slug' }
            );

            if (error) {
                console.error(error);
                btn.textContent = 'error — check console';
                setTimeout(() => btn.textContent = 'post', 3000);
                return;
            }

            btn.textContent = 'posted!';
            textarea.value = '';
            textarea.style.height = '';
            document.getElementById('title-input').value = '';
            stagedFiles = []; uploadedFiles = [];
            renderAttachList();
            setTimeout(() => btn.textContent = 'post', 2000);
        });
    </script>
</body>
