    <div class="entry-container">
        <h1 id="date-label" contenteditable="true" spellcheck="false">new entry</h1>
        <textarea></textarea>
        <button type="button" id="post-btn" class="btn-app">post</button>
    </div>

    <script src="js/app.js"></script>
    <script>
        const textarea = document.querySelector('textarea');
        const dateLabel = document.getElementById('date-label');

        // clear "new entry" placeholder on first click
        dateLabel.addEventListener('focus', () => {
            if (dateLabel.textContent.trim() === 'new entry') {
                dateLabel.textContent = '';
            }
        });
        dateLabel.addEventListener('blur', () => {
            if (dateLabel.textContent.trim() === '') {
                dateLabel.textContent = 'new entry';
            }
        });

        textarea.addEventListener('input', () => {
            if (textarea.scrollHeight > textarea.clientHeight) {
                textarea.style.height = textarea.scrollHeight + 'px';
            }
        });

        const OWNER = 'michiscoding';
        const REPO = 'michiscoding.github.io';
        const BRANCH = 'main';

        function getToken() {
            let token = localStorage.getItem('gh_token');
            if (!token) {
                token = prompt('enter your github token:');
                if (token) localStorage.setItem('gh_token', token);
            }
            return token;
        }

        // parse MMDDYY → { yyyy, mm, dd }, fallback to today
        function parseDate() {
            const raw = dateLabel.textContent.trim();
            if (/^\d{6}$/.test(raw)) {
                const mm = raw.slice(0, 2);
                const dd = raw.slice(2, 4);
                const yy = raw.slice(4, 6);
                const yyyy = '20' + yy;
                return { yyyy, mm, dd };
            }
            const d = new Date();
            return {
                yyyy: String(d.getFullYear()),
                mm: String(d.getMonth() + 1).padStart(2, '0'),
                dd: String(d.getDate()).padStart(2, '0'),
            };
        }

        function getDatePath() {
            const { yyyy, mm, dd } = parseDate();
            return `entries/${yyyy}-${mm}-${dd}.html`;
        }

        function getDateTitle() {
            const months = ['january','february','march','april','may','june','july','august','september','october','november','december'];
            const { yyyy, mm, dd } = parseDate();
            const monthName = months[parseInt(mm, 10) - 1];
            return `${monthName} ${parseInt(dd, 10)} ${yyyy}`;
        }

        function buildHTML(text) {
            const body = text
                .split('\n')
                .map(line => line.trimEnd())
                .join('<br>\n');

            const title = getDateTitle();
            const parts = [
                '<!doctype html>',
                '<html lang="en">',
                '<head>',
                '    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@100..900&display=swap" rel="stylesheet">',
                '    <link rel="stylesheet" href="/css/bootstrap.min.css">',
                '    <link rel="stylesheet" href="/css/home.css">',
                '    <link rel="stylesheet" href="/css/blog.css">',
                '    <link rel="stylesheet" href="/css/entry.css">',
                '    <style>:root { --maxWidth: 67vw; }</style>',
                '    <title>' + title + '</title>',
                '</head>',
                '<body>',
                '  <button type="button" class="back-btn" onclick="history.back()">←</button>',
                '  <div class="entry-container">',
                '    <h1>' + title + '</h1>',
                '    <div class="entry-content">',
                '      <p>' + body + '</p>',
                '    </div>',
                '  </div>',
                '<' + '/body>',
                '<script src="/js/home.js"><' + '/script>',
                '<' + '/html>',
            ];
            return parts.join('\n');
        }

        document.getElementById('post-btn').addEventListener('click', async () => {
            const token = getToken();
            if (!token) return;

            const btn = document.getElementById('post-btn');
            const path = getDatePath();
            const html = buildHTML(textarea.value);
            const encoded = btoa(unescape(encodeURIComponent(html)));

            btn.textContent = 'posting...';

            try {
                // check if file already exists to get sha
                let sha;
                const check = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/${path}`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (check.ok) {
                    const existing = await check.json();
                    sha = existing.sha;
                }

                const res = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/${path}`, {
                    method: 'PUT',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        message: `entry ${path}`,
                        content: encoded,
                        branch: BRANCH,
                        ...(sha && { sha }),
                    })
                });

                if (res.ok) {
                    btn.textContent = 'posted!';
                    textarea.value = '';
                    textarea.style.height = '';
                    dateLabel.textContent = 'new entry';
                    setTimeout(() => btn.textContent = 'post', 2000);
                } else {
                    const err = await res.json();
                    console.error(err);
                    btn.textContent = 'error — check console';
                    setTimeout(() => btn.textContent = 'post', 3000);
                }
            } catch (e) {
                console.error(e);
                btn.textContent = 'error — check console';
                setTimeout(() => btn.textContent = 'post', 3000);
            }
        });
    </script>
</body>
