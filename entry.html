    <nav class="nav-menu">

                <ul class="nav-sub" id="work-sub">
                    <li><a href="powerapps-new.html">powerapps</a></li>

            </li>

        </ul>

    <div class="entry-container">
        <h1 id="date-label" contenteditable="true" spellcheck="false">new entry</h1>
        <textarea></textarea>

        <div id="photo-strip">
            <div id="photo-previews"></div>
            <label id="photo-add-btn" for="photo-input">+ add photos</label>
            <input type="file" id="photo-input" accept="image/*,video/*" multiple>
        </div>

        <button type="button" id="post-btn" class="btn-app">post</button>
    </div>

    <script src="js/app.js"></script>
    <script>
        const textarea = document.querySelector('textarea');
        const dateLabel = document.getElementById('date-label');
        const photoInput = document.getElementById('photo-input');
        const photoPreviews = document.getElementById('photo-previews');

        // files array: { file, base64, name }
        const photos = [];

        photoInput.addEventListener('change', () => {
            Array.from(photoInput.files).forEach(addPhoto);
            photoInput.value = '';
        });

        function addPhoto(file) {
            const reader = new FileReader();
            reader.onload = e => {
                const base64Full = e.target.result; // data:image/...;base64,XXX
                const base64 = base64Full.split(',')[1];
                const entry = { file, base64, name: sanitizeName(file.name) };
                photos.push(entry);

                const thumb = document.createElement('div');
                thumb.className = 'photo-thumb';

                const isVideo = file.type.startsWith('video/');
                const media = document.createElement(isVideo ? 'video' : 'img');
                media.src = base64Full;
                if (isVideo) { media.muted = true; media.loop = true; media.autoplay = true; media.playsInline = true; }

                const removeBtn = document.createElement('button');
                removeBtn.type = 'button';
                removeBtn.className = 'remove-btn';
                removeBtn.textContent = '×';
                removeBtn.addEventListener('click', () => {
                    photos.splice(photos.indexOf(entry), 1);
                    thumb.remove();
                });

                thumb.appendChild(media);
                thumb.appendChild(removeBtn);
                photoPreviews.appendChild(thumb);
            };
            reader.readAsDataURL(file);
        }

        function sanitizeName(name) {
            return name.toLowerCase().replace(/[^a-z0-9.\-_]/g, '-');
        }

        // clear "new entry" placeholder on first click
        dateLabel.addEventListener('focus', () => {
            if (dateLabel.textContent.trim() === 'new entry') {
                dateLabel.textContent = '';
            }
        });
        dateLabel.addEventListener('blur', () => {
            if (dateLabel.textContent.trim() === '') {
                dateLabel.textContent = 'new entry';
            }
        });

        textarea.addEventListener('input', () => {
            if (textarea.scrollHeight > textarea.clientHeight) {
                textarea.style.height = textarea.scrollHeight + 'px';
            }
        });

        const OWNER = 'michiscoding';
        const REPO = 'michiscoding.github.io';
        const BRANCH = 'main';

        function getToken() {
            let token = localStorage.getItem('gh_token');
            if (!token) {
                token = prompt('enter your github token:');
                if (token) localStorage.setItem('gh_token', token);
            }
            return token;
        }

        // parse MMDDYY → { yyyy, mm, dd }, fallback to today
        function parseDate() {
            const raw = dateLabel.textContent.trim();
            if (/^\d{6}$/.test(raw)) {
                const mm = raw.slice(0, 2);
                const dd = raw.slice(2, 4);
                const yy = raw.slice(4, 6);
                const yyyy = '20' + yy;
                return { yyyy, mm, dd };
            }
            const d = new Date();
            return {
                yyyy: String(d.getFullYear()),
                mm: String(d.getMonth() + 1).padStart(2, '0'),
                dd: String(d.getDate()).padStart(2, '0'),
            };
        }

        function getDatePath() {
            const { yyyy, mm, dd } = parseDate();
            return `entries/${yyyy}-${mm}-${dd}.html`;
        }

        function getDateTitle() {
            const months = ['january','february','march','april','may','june','july','august','september','october','november','december'];
            const { yyyy, mm, dd } = parseDate();
            const monthName = months[parseInt(mm, 10) - 1];
            return `${monthName} ${parseInt(dd, 10)} ${yyyy}`;
        }

        function buildHTML(text, imagePaths) {
            const body = text
                .split('\n')
                .map(line => line.trimEnd())
                .join('<br>\n');

            const title = getDateTitle();

            let galleryHTML = '';
            if (imagePaths.length) {
                const thumbs = imagePaths.map(p =>
                    `      <div class="entry-gallery-item"><img src="/${p}" loading="lazy"></div>`
                ).join('\n');
                galleryHTML = [
                    '    <div class="entry-gallery">',
                    '      <button class="gallery-arrow gallery-prev" aria-label="previous">&#8592;</button>',
                    '      <div class="gallery-track">',
                    thumbs,
                    '      </div>',
                    '      <button class="gallery-arrow gallery-next" aria-label="next">&#8594;</button>',
                    '    </div>',
                ].join('\n');
            }

            const parts = [
                '<!doctype html>',
                '<html lang="en">',
                '<head>',
                '    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@100..900&display=swap" rel="stylesheet">',
                '    <link rel="stylesheet" href="/css/bootstrap.min.css">',
                '    <link rel="stylesheet" href="/css/home.css">',
                '    <link rel="stylesheet" href="/css/blog.css">',
                '    <link rel="stylesheet" href="/css/entry.css">',
                '    <style>:root { --maxWidth: 67vw; }</style>',
                '    <title>' + title + '</title>',
                '</head>',
                '<body>',
                '  <button type="button" class="back-btn" onclick="history.back()">←</button>',
                '  <div class="entry-container">',
                '    <h1>' + title + '</h1>',
                '    <div class="entry-content">',
                '      <p>' + body + '</p>',
                '    </div>',
                galleryHTML,
                '  </div>',
                '<' + '/body>',
                '<script src="/js/home.js"><' + '/script>',
                '<' + '/html>',
            ];
            return parts.join('\n');
        }

        async function uploadFile(token, path, base64) {
            let sha;
            const check = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/${path}`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            if (check.ok) sha = (await check.json()).sha;

            return fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/${path}`, {
                method: 'PUT',
                headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: `image ${path}`, content: base64, branch: BRANCH, ...(sha && { sha }) })
            });
        }

        document.getElementById('post-btn').addEventListener('click', async () => {
            const token = getToken();
            if (!token) return;

            const btn = document.getElementById('post-btn');
            btn.textContent = 'posting...';

            // upload images first
            const { yyyy, mm, dd } = parseDate();
            const imagePaths = [];
            for (const photo of photos) {
                const imgPath = `entries/images/${yyyy}-${mm}-${dd}/${photo.name}`;
                const res = await uploadFile(token, imgPath, photo.base64);
                if (res.ok) imagePaths.push(imgPath);
            }

            const path = getDatePath();
            const html = buildHTML(textarea.value, imagePaths);
            const encoded = btoa(unescape(encodeURIComponent(html)));


            try {
                // check if file already exists to get sha
                let sha;
                const check = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/${path}`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (check.ok) {
                    const existing = await check.json();
                    sha = existing.sha;
                }

                const res = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/${path}`, {
                    method: 'PUT',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        message: `entry ${path}`,
                        content: encoded,
                        branch: BRANCH,
                        ...(sha && { sha }),
                    })
                });

                if (res.ok) {
                    btn.textContent = 'posted!';
                    textarea.value = '';
                    textarea.style.height = '';
                    dateLabel.textContent = 'new entry';
                    photos.length = 0;
                    photoPreviews.innerHTML = '';
                    setTimeout(() => btn.textContent = 'post', 2000);
                } else {
                    const err = await res.json();
                    console.error(err);
                    btn.textContent = 'error — check console';
                    setTimeout(() => btn.textContent = 'post', 3000);
                }
            } catch (e) {
                console.error(e);
                btn.textContent = 'error — check console';
                setTimeout(() => btn.textContent = 'post', 3000);
            }
        });
    </script>
</body>
</html>
