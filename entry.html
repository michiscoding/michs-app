    <div class="entry-container">
        <h1 id="date-label" contenteditable="true" spellcheck="false">new entry</h1>
        <textarea></textarea>

        <input type="text" id="music-input" placeholder="music url (spotify / youtube)...">

        <div id="photo-strip">
            <div id="photo-previews"></div>
            <label id="photo-add-btn" for="photo-input">+ add photos</label>
            <input type="file" id="photo-input" accept="image/*,video/*" multiple>
        </div>

        <button type="button" id="post-btn" class="btn-app">save</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>
    <script src="js/app.js"></script>
    <script>
        const textarea = document.querySelector('textarea');
        const dateLabel = document.getElementById('date-label');
        const photoInput = document.getElementById('photo-input');
        const photoPreviews = document.getElementById('photo-previews');
        const MEDIA_BASE = SUPABASE_URL + '/storage/v1/object/public/media/';

        // Date defaults to when the page was opened — writing past midnight won't flip the date
        const _d = new Date();
        const DEFAULT_CODE = `${String(_d.getMonth()+1).padStart(2,'0')}${String(_d.getDate()).padStart(2,'0')}${String(_d.getFullYear()).slice(2)}`;
        dateLabel.textContent = DEFAULT_CODE;

        function codeToIso(code) {
            if (!/^\d{6}$/.test(code)) return null;
            return `20${code.slice(4,6)}-${code.slice(0,2)}-${code.slice(2,4)}`;
        }

        function currentDate() {
            return codeToIso(dateLabel.textContent.trim()) || codeToIso(DEFAULT_CODE);
        }

        // Load existing entry for a given date, or clear if none
        const entryContent = [textarea, document.getElementById('photo-strip')];

        function fadeOut(cb) {
            entryContent.forEach(el => { el.style.transition = 'opacity 0.2s ease'; el.style.opacity = '0'; });
            setTimeout(cb, 200);
        }
        function fadeIn() {
            entryContent.forEach(el => { el.style.opacity = '1'; });
        }

        async function loadEntryForDate(date, animate) {
            const doLoad = async () => {
                textarea.value = '';
                textarea.style.height = '';
                photoPreviews.querySelectorAll('.photo-thumb:not(.new-thumb)').forEach(t => t.remove());
                newPhotos.length = 0;
                photoPreviews.querySelectorAll('.photo-thumb.new-thumb').forEach(t => t.remove());

                const [{ data: entryData }, { data: photoData }] = await Promise.all([
                    db.from('entries').select('content, music_url').eq('date', date).single(),
                    db.from('entry_photos').select('storage_path').eq('entry_date', date)
                ]);
                document.getElementById('music-input').value = entryData?.music_url || '';
                if (entryData?.content) {
                    textarea.value = entryData.content;
                    requestAnimationFrame(() => { textarea.style.height = 'auto'; textarea.style.height = textarea.scrollHeight + 'px'; });
                }
                if (photoData?.length) {
                    photoData.forEach(p => {
                        const src = p.storage_path.startsWith('http') ? p.storage_path : MEDIA_BASE + p.storage_path;
                        const isVid = /\.(mp4|webm|mov)$/i.test(p.storage_path);
                        const thumb = document.createElement('div');
                        thumb.className = 'photo-thumb';
                        const media = document.createElement(isVid ? 'video' : 'img');
                        media.src = src;
                        if (isVid) { media.muted = true; media.loop = true; media.autoplay = true; media.playsInline = true; }
                        thumb.appendChild(media);
                        photoPreviews.appendChild(thumb);
                    });
                }
                fadeIn();
            };

            if (animate) { fadeOut(doLoad); } else { await doLoad(); }
        }

        // Only new photos added this session — existing ones are shown above and left untouched
        const newPhotos = [];

        loadEntryForDate(currentDate(), false);

        dateLabel.addEventListener('blur', () => {
            const date = currentDate();
            if (!date) { dateLabel.textContent = DEFAULT_CODE; return; }
            loadEntryForDate(date, true);
        });

        photoInput.addEventListener('change', () => {
            Array.from(photoInput.files).forEach(addPhoto);
            photoInput.value = '';
        });

        function addPhoto(file) {
            const url = URL.createObjectURL(file);
            const entry = { file, name: sanitizeName(file.name) };
            newPhotos.push(entry);

            const thumb = document.createElement('div');
            thumb.className = 'photo-thumb new-thumb';
            const isVideo = file.type.startsWith('video/');
            const media = document.createElement(isVideo ? 'video' : 'img');
            media.src = url;
            if (isVideo) { media.muted = true; media.loop = true; media.autoplay = true; media.playsInline = true; }

            const removeBtn = document.createElement('button');
            removeBtn.type = 'button';
            removeBtn.className = 'remove-btn';
            removeBtn.textContent = '×';
            removeBtn.addEventListener('click', () => {
                newPhotos.splice(newPhotos.indexOf(entry), 1);
                thumb.remove();
            });

            thumb.appendChild(media);
            thumb.appendChild(removeBtn);
            photoPreviews.appendChild(thumb);
        }

        function sanitizeName(name) {
            return name.toLowerCase().replace(/[^a-z0-9.\-_]/g, '-');
        }

        textarea.addEventListener('input', () => {
            if (textarea.scrollHeight > textarea.clientHeight) textarea.style.height = textarea.scrollHeight + 'px';
        });

        document.getElementById('post-btn').addEventListener('click', async () => {
            const adminDb = await getAdminClient();
            if (!adminDb) return;

            const btn = document.getElementById('post-btn');
            btn.textContent = 'saving...';

            const date = currentDate();

            // Upload only new photos — never removes existing ones
            const photoPaths = [];
            for (const photo of newPhotos) {
                const path = `entry-photos/${date}/${photo.name}`;
                const { error: uploadError } = await adminDb.storage.from('media').upload(path, photo.file, { upsert: true, contentType: photo.file.type });
                if (uploadError) { console.error('photo upload error:', uploadError); }
                else { photoPaths.push(path); }
            }

            // Upsert entry text (creates if new, updates content if existing)
            const musicUrl = document.getElementById('music-input').value.trim() || null;
            const { error } = await adminDb.from('entries').upsert({ date, content: textarea.value, music_url: musicUrl }, { onConflict: 'date' });
            if (error) {
                btn.textContent = 'error — check console';
                console.error(error);
                setTimeout(() => btn.textContent = 'save', 3000);
                return;
            }

            // Append new photo rows only
            if (photoPaths.length) {
                const { error: photoInsertError } = await adminDb.from('entry_photos').insert(photoPaths.map(p => ({ entry_date: date, storage_path: p })));
                if (photoInsertError) {
                    console.error('entry_photos insert error:', photoInsertError);
                    btn.textContent = 'error — check console';
                    setTimeout(() => btn.textContent = 'save', 3000);
                    return;
                }
            }

            newPhotos.length = 0;
            btn.textContent = 'saved!';
            setTimeout(() => btn.textContent = 'save', 2000);
        });
    </script>
