    <div class="entry-container">
        <h1 id="date-label" contenteditable="true" spellcheck="false">new entry</h1>
        <textarea></textarea>

        <div id="photo-strip">
            <div id="photo-previews"></div>
            <label id="photo-add-btn" for="photo-input">+ add photos</label>
            <input type="file" id="photo-input" accept="image/*,video/*" multiple>
        </div>

        <button type="button" id="post-btn" class="btn-app">post</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>
    <script src="js/app.js"></script>
    <script>
        const textarea = document.querySelector('textarea');
        const dateLabel = document.getElementById('date-label');
        const photoInput = document.getElementById('photo-input');
        const photoPreviews = document.getElementById('photo-previews');

        const photos = [];

        photoInput.addEventListener('change', () => {
            Array.from(photoInput.files).forEach(addPhoto);
            photoInput.value = '';
        });

        function addPhoto(file) {
            const url = URL.createObjectURL(file);
            const entry = { file, name: sanitizeName(file.name) };
            photos.push(entry);

            const thumb = document.createElement('div');
            thumb.className = 'photo-thumb';
            const isVideo = file.type.startsWith('video/');
            const media = document.createElement(isVideo ? 'video' : 'img');
            media.src = url;
            if (isVideo) { media.muted = true; media.loop = true; media.autoplay = true; media.playsInline = true; }

            const removeBtn = document.createElement('button');
            removeBtn.type = 'button';
            removeBtn.className = 'remove-btn';
            removeBtn.textContent = '×';
            removeBtn.addEventListener('click', () => {
                photos.splice(photos.indexOf(entry), 1);
                thumb.remove();
            });

            thumb.appendChild(media);
            thumb.appendChild(removeBtn);
            photoPreviews.appendChild(thumb);
        }

        function sanitizeName(name) {
            return name.toLowerCase().replace(/[^a-z0-9.\-_]/g, '-');
        }

        dateLabel.addEventListener('focus', () => {
            if (dateLabel.textContent.trim() === 'new entry') dateLabel.textContent = '';
        });
        dateLabel.addEventListener('blur', () => {
            if (dateLabel.textContent.trim() === '') dateLabel.textContent = 'new entry';
        });

        textarea.addEventListener('input', () => {
            if (textarea.scrollHeight > textarea.clientHeight) textarea.style.height = textarea.scrollHeight + 'px';
        });

        function parseDate() {
            const raw = dateLabel.textContent.trim();
            if (/^\d{6}$/.test(raw)) {
                return { yyyy: '20' + raw.slice(4, 6), mm: raw.slice(0, 2), dd: raw.slice(2, 4) };
            }
            const d = new Date();
            return {
                yyyy: String(d.getFullYear()),
                mm: String(d.getMonth() + 1).padStart(2, '0'),
                dd: String(d.getDate()).padStart(2, '0'),
            };
        }

        document.getElementById('post-btn').addEventListener('click', async () => {
            const adminDb = await getAdminClient();
            if (!adminDb) return;

            const btn = document.getElementById('post-btn');
            btn.textContent = 'posting...';

            const { yyyy, mm, dd } = parseDate();
            const date = `${yyyy}-${mm}-${dd}`;

            // upload photos to supabase storage
            const photoPaths = [];
            for (const photo of photos) {
                const path = `entry-photos/${date}/${photo.name}`;
                const { error } = await adminDb.storage.from('media').upload(path, photo.file, { upsert: true });
                if (!error) photoPaths.push(path);
            }

            // upsert entry row
            const { error } = await adminDb.from('entries').upsert({ date, content: textarea.value }, { onConflict: 'date' });

            if (error) {
                btn.textContent = 'error — check console';
                console.error(error);
                setTimeout(() => btn.textContent = 'post', 3000);
                return;
            }

            // insert entry_photos rows
            if (photoPaths.length) {
                await adminDb.from('entry_photos').insert(photoPaths.map(p => ({ entry_date: date, storage_path: p })));
            }

            btn.textContent = 'posted!';
            textarea.value = '';
            textarea.style.height = '';
            dateLabel.textContent = 'new entry';
            photos.length = 0;
            photoPreviews.innerHTML = '';
            setTimeout(() => btn.textContent = 'post', 2000);
        });
    </script>
