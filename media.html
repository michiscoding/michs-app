    <style>
        .page { max-width: 720px; margin: 0 auto; padding: 1.5rem 1.25rem 4rem; }
        h2 { font-size: 1rem; font-weight: 700; margin-bottom: 1.25rem; }

        .type-row { display: flex; gap: 0.5rem; margin-bottom: 1.25rem; }
        .type-btn { flex: 1; padding: 0.45rem; border: 1px solid #ddd; border-radius: 8px; background: none; font-family: inherit; font-size: 0.82rem; font-weight: 600; color: #aaa; cursor: pointer; }
        .type-btn.active { background: #111; color: #fff; border-color: #111; }
        body.dark .type-btn { border-color: #333; color: #555; }
        body.dark .type-btn.active { background: #ddd; color: #111; border-color: #ddd; }

        .search-row { display: flex; gap: 0.5rem; margin-bottom: 1rem; }
        .search-row input { flex: 1; }
        .search-btn { padding: 0.65rem 1rem; background: #111; color: #fff; border: none; border-radius: 8px; font-family: inherit; font-size: 0.82rem; font-weight: 600; cursor: pointer; white-space: nowrap; }
        .search-btn:hover { background: #333; }
        body.dark .search-btn { background: #ddd; color: #111; }

        .results { display: flex; flex-direction: column; gap: 0.5rem; margin-bottom: 1.5rem; }
        .result-item { display: flex; align-items: center; gap: 0.75rem; padding: 0.6rem 0.75rem; border-radius: 8px; background: #ededed; cursor: pointer; }
        .result-item:hover { background: #e0e0e0; }
        body.dark .result-item { background: #1e1e1e; }
        body.dark .result-item:hover { background: #2a2a2a; }
        .result-cover { width: 36px; height: 54px; object-fit: cover; border-radius: 3px; flex-shrink: 0; background: #ddd; display: block; }
        body.dark .result-cover { background: #333; }
        .result-info { flex: 1; min-width: 0; }
        .result-title { font-size: 0.83rem; font-weight: 600; color: #111; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        body.dark .result-title { color: #ddd; }
        .result-sub { font-size: 0.72rem; color: #888; }

        .selected-card { display: flex; gap: 1rem; margin-bottom: 1.25rem; padding: 1rem; background: #ededed; border-radius: 10px; align-items: flex-start; }
        body.dark .selected-card { background: #1e1e1e; }
        .selected-cover { width: 54px; height: 80px; object-fit: cover; border-radius: 4px; flex-shrink: 0; }
        .selected-info { flex: 1; }
        .selected-title { font-size: 0.88rem; font-weight: 700; color: #111; margin-bottom: 0.2rem; }
        body.dark .selected-title { color: #eee; }
        .selected-sub { font-size: 0.75rem; color: #888; }
        .selected-clear { background: none; border: none; color: #bbb; cursor: pointer; font-size: 0.75rem; padding: 0; font-family: inherit; }
        .selected-clear:hover { color: #555; }

        .form-field { margin-bottom: 1rem; }
        .form-label { font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: #aaa; margin-bottom: 0.4rem; display: block; }
        textarea { width: 100%; background: #ededed; border: none; border-radius: 8px; padding: 0.65rem 1rem; color: #111; outline: none; resize: none; min-height: 90px; box-sizing: border-box; font-family: inherit; font-size: inherit; }
        body.dark textarea { background: #1e1e1e; color: #ddd; }
        input[type="date"] { background: #ededed; border: none; border-radius: 8px; padding: 0.65rem 1rem; color: #111; outline: none; width: 100%; box-sizing: border-box; }
        body.dark input[type="date"] { background: #1e1e1e; color: #ddd; }

        .star-row { display: flex; gap: 0.35rem; }
        .star-btn { background: none; border: none; font-size: 1.4rem; cursor: pointer; color: #ddd; line-height: 1; padding: 0; transition: color 0.15s; }
        body.dark .star-btn { color: #444; }
        .star-btn.filled { color: #f5c518; }

        .save-btn { width: 100%; padding: 0.75rem; background: #111; color: #fff; border: none; border-radius: 10px; font-family: inherit; font-size: 0.88rem; font-weight: 700; cursor: pointer; margin-top: 0.5rem; }
        .save-btn:hover { background: #333; }
        body.dark .save-btn { background: #ddd; color: #111; }
        .save-btn:disabled { opacity: 0.4; cursor: not-allowed; }

        .m-status { font-size: 0.8rem; color: #aaa; margin-top: 0.75rem; text-align: center; min-height: 1.2em; }

        .selected-card.food-mode { flex-direction: column; }
        .selected-cover.landscape { width: 100%; height: auto; aspect-ratio: 4/3; object-fit: cover; border-radius: 8px; }

        .places-results { display: flex; flex-direction: column; gap: 0.35rem; margin-bottom: 1rem; }
        .place-item { display: flex; align-items: center; gap: 0.65rem; padding: 0.6rem 0.75rem; border-radius: 8px; background: #ededed; cursor: pointer; }
        .place-item:hover { background: #e0e0e0; }
        body.dark .place-item { background: #1e1e1e; }
        body.dark .place-item:hover { background: #2a2a2a; }
        .place-photo { width: 46px; height: 46px; object-fit: cover; border-radius: 5px; flex-shrink: 0; background: #ddd; display: block; }
        body.dark .place-photo { background: #333; }
        .place-info { flex: 1; min-width: 0; }
        .place-name { font-size: 0.83rem; font-weight: 600; color: #111; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        body.dark .place-name { color: #ddd; }
        .place-addr { font-size: 0.72rem; color: #888; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    </style>
</head>

<div class="page">
    <h2>media</h2>

    <div class="type-row">
        <button class="type-btn active" data-type="book">book</button>
        <button class="type-btn" data-type="movie">movie</button>
        <button class="type-btn" data-type="food">food</button>
    </div>

    <div class="search-row">
        <input type="text" id="m-search" placeholder="search title...">
        <button class="search-btn" id="m-search-btn">search</button>
    </div>

    <div class="results" id="m-search-results"></div>

    <div id="m-form" style="display:none">
        <div class="selected-card">
            <img class="selected-cover" id="m-sel-cover" src="" alt="">
            <div class="selected-info">
                <div class="selected-title" id="m-sel-title"></div>
                <div class="selected-sub" id="m-sel-sub"></div>
            </div>
            <button class="selected-clear" id="m-clear">clear</button>
        </div>

        <div class="form-field">
            <label class="form-label">notes</label>
            <textarea id="m-notes" placeholder="thoughts..."></textarea>
        </div>
        <div class="form-field">
            <label class="form-label">rating</label>
            <div class="star-row" id="m-stars">
                <button class="star-btn" data-val="1">★</button>
                <button class="star-btn" data-val="2">★</button>
                <button class="star-btn" data-val="3">★</button>
                <button class="star-btn" data-val="4">★</button>
                <button class="star-btn" data-val="5">★</button>
            </div>
        </div>
        <div class="form-field">
            <label class="form-label">date</label>
            <input type="date" id="m-date">
        </div>
        <button class="save-btn" id="m-save">save</button>
        <div class="m-status" id="m-status"></div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase.js"></script>
<script src="js/app.js"></script>
<script>
const GOOGLE_KEY = 'AIzaSyCt9_PogrDmDY1ndTit3F7WF69iLey2eQ4';
const TMDB_KEY = ''; // get a free key at developers.themoviedb.org

let currentType = 'book';
let selectedItem = null;
let currentRating = 0;

document.querySelectorAll('.type-btn').forEach(btn => {
    btn.onclick = () => {
        document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentType = btn.dataset.type;
        document.getElementById('m-search-results').innerHTML = '';
        document.getElementById('m-search').value = '';
        searchInput.placeholder = currentType === 'food' ? 'search restaurants...' : 'search title...';
        document.getElementById('m-search-btn').style.display = currentType === 'food' ? 'none' : '';
        clearSelection();
    };
});

const searchInput = document.getElementById('m-search');
document.getElementById('m-search-btn').onclick = doSearch;
searchInput.addEventListener('keydown', e => { if (e.key === 'Enter' && currentType !== 'food') doSearch(); });

let placeDebounce = null;
searchInput.addEventListener('input', () => {
    if (currentType !== 'food') return;
    clearTimeout(placeDebounce);
    const q = searchInput.value.trim();
    if (!q) { document.getElementById('m-search-results').innerHTML = ''; return; }
    placeDebounce = setTimeout(() => searchPlaces(q), 400);
});

async function doSearch() {
    const q = searchInput.value.trim();
    if (!q) return;
    document.getElementById('m-search-results').innerHTML = '<div style="font-size:0.8rem;color:#aaa;padding:0.5rem 0">searching...</div>';
    if (currentType === 'book') await searchBooks(q);
    else await searchMovies(q);
}

async function searchBooks(q) {
    try {
        const res = await fetch(`https://www.googleapis.com/books/v1/volumes?q=${encodeURIComponent(q)}&maxResults=8&key=${GOOGLE_BOOKS_KEY}`);
        const data = await res.json();
        if (!res.ok) {
            document.getElementById('m-search-results').innerHTML = `<div style="font-size:0.8rem;color:#aaa;padding:0.5rem 0">error ${res.status}: ${data.error?.message || 'unknown'}</div>`;
            return;
        }
        renderResults((data.items || []).map(b => {
            const info = b.volumeInfo;
            const cover = info.imageLinks?.thumbnail?.replace('http://', 'https://') || '';
            return {
                title: info.title,
                sub: [info.authors?.[0], info.publishedDate?.slice(0, 4)].filter(Boolean).join(' · '),
                cover,
            };
        }));
    } catch (e) {
        document.getElementById('m-search-results').innerHTML = `<div style="font-size:0.8rem;color:#aaa;padding:0.5rem 0">fetch error: ${e.message}</div>`;
    }
}

async function searchPlaces(q) {
    const el = document.getElementById('m-search-results');
    el.innerHTML = '<div style="font-size:0.8rem;color:#aaa;padding:0.5rem 0">searching...</div>';
    try {
        const res = await fetch('https://places.googleapis.com/v1/places:searchText', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'X-Goog-Api-Key': GOOGLE_KEY,
                'X-Goog-FieldMask': 'places.id,places.displayName,places.shortFormattedAddress,places.photos'
            },
            body: JSON.stringify({ textQuery: q, pageSize: 6 })
        });
        const data = await res.json();
        const places = data.places || [];
        if (!places.length) { el.innerHTML = '<div style="font-size:0.8rem;color:#aaa;padding:0.5rem 0">no results</div>'; return; }
        el.innerHTML = `<div class="places-results">${places.map((p, i) => {
            const photoName = p.photos?.[0]?.name;
            const thumbUrl = photoName ? `https://places.googleapis.com/v1/${photoName}/media?maxWidthPx=120&key=${GOOGLE_KEY}` : '';
            return `<div class="place-item" data-index="${i}">
                <img class="place-photo" src="${thumbUrl}" alt="">
                <div class="place-info">
                    <div class="place-name">${p.displayName?.text || ''}</div>
                    <div class="place-addr">${p.shortFormattedAddress || ''}</div>
                </div>
            </div>`;
        }).join('')}</div>`;
        el.querySelectorAll('.place-item').forEach(item => {
            const p = places[parseInt(item.dataset.index)];
            const photoName = p.photos?.[0]?.name;
            const photoUrl = photoName ? `https://places.googleapis.com/v1/${photoName}/media?maxWidthPx=800&key=${GOOGLE_KEY}` : null;
            item.onclick = () => selectItem({ title: p.displayName?.text || '', sub: p.shortFormattedAddress || '', cover: photoUrl, placeId: p.id, isFood: true });
        });
    } catch (e) {
        el.innerHTML = `<div style="font-size:0.8rem;color:#aaa;padding:0.5rem 0">error: ${e.message}</div>`;
    }
}

async function searchMovies(q) {
    if (!TMDB_KEY) {
        document.getElementById('m-search-results').innerHTML = '<div style="font-size:0.8rem;color:#aaa;padding:0.5rem 0">add TMDB_KEY to enable movie search</div>';
        return;
    }
    try {
        const res = await fetch(`https://api.themoviedb.org/3/search/movie?query=${encodeURIComponent(q)}&api_key=${TMDB_KEY}&language=en-US`);
        const data = await res.json();
        renderResults((data.results || []).slice(0, 6).map(m => ({
            title: m.title,
            sub: m.release_date?.slice(0, 4) || '',
            cover: m.poster_path ? `https://image.tmdb.org/t/p/w185${m.poster_path}` : '',
        })));
    } catch { renderResults([]); }
}

function renderResults(items) {
    const el = document.getElementById('m-search-results');
    if (!items.length) { el.innerHTML = '<div style="font-size:0.8rem;color:#aaa;padding:0.5rem 0">no results</div>'; return; }
    el.innerHTML = items.map((item, i) => `
        <div class="result-item" data-index="${i}">
            ${item.cover ? `<img class="result-cover" src="${item.cover}" alt="">` : '<div class="result-cover"></div>'}
            <div class="result-info">
                <div class="result-title">${item.title}</div>
                <div class="result-sub">${item.sub}</div>
            </div>
        </div>`).join('');
    el.querySelectorAll('.result-item').forEach(row => {
        row.onclick = () => selectItem(items[parseInt(row.dataset.index)]);
    });
}

function selectItem(item) {
    selectedItem = item;
    const cover = document.getElementById('m-sel-cover');
    const card = cover.closest('.selected-card');
    cover.src = item.cover || '';
    cover.style.display = item.cover ? '' : 'none';
    cover.classList.toggle('landscape', !!item.isFood);
    card.classList.toggle('food-mode', !!item.isFood);
    document.getElementById('m-sel-title').textContent = item.title;
    document.getElementById('m-sel-sub').textContent = item.sub;
    document.getElementById('m-search-results').innerHTML = '';
    document.getElementById('m-form').style.display = '';
    document.getElementById('m-date').value = new Date().toISOString().slice(0, 10);
    setRating(0);
}

function clearSelection() {
    selectedItem = null;
    document.getElementById('m-form').style.display = 'none';
    document.getElementById('m-notes').value = '';
    setRating(0);
}

document.querySelectorAll('.star-btn').forEach(btn => {
    btn.onclick = () => setRating(parseInt(btn.dataset.val));
    btn.onmouseover = () => highlightStars(parseInt(btn.dataset.val));
    btn.onmouseout = () => highlightStars(currentRating);
});

function setRating(val) { currentRating = val; highlightStars(val); }
function highlightStars(val) {
    document.querySelectorAll('.star-btn').forEach(btn => {
        btn.classList.toggle('filled', parseInt(btn.dataset.val) <= val);
    });
}

document.getElementById('m-clear').onclick = clearSelection;
document.getElementById('m-save').onclick = async () => {
    if (!selectedItem) return;
    const btn = document.getElementById('m-save');
    const status = document.getElementById('m-status');
    btn.disabled = true;
    status.textContent = 'saving...';

    const client = await getAdminClient();
    if (!client) { btn.disabled = false; status.textContent = ''; return; }

    const notes = document.getElementById('m-notes').value.trim() || null;
    const rating = currentRating || null;
    const date = document.getElementById('m-date').value || null;

    const { error } = currentType === 'food'
        ? await client.from('food').insert({ name: selectedItem.title, location: selectedItem.sub || null, photo_url: selectedItem.cover || null, place_id: selectedItem.placeId || null, notes, rating, date })
        : await client.from('media').insert({ type: currentType, title: selectedItem.title, cover_url: selectedItem.cover || null, notes, rating, date });

    if (error) {
        status.textContent = 'error: ' + error.message;
    } else {
        status.textContent = 'saved!';
        clearSelection();
        searchInput.value = '';
        setTimeout(() => { status.textContent = ''; }, 2000);
    }
    btn.disabled = false;
};

document.body.style.opacity = '1';
</script>
</body>
