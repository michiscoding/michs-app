<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="css/style.css">
    <title>edit</title>
    <link rel="manifest" href="manifest.json">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="mishi">
</head>

<body>

    <label class="burger" for="burger">
        <input type="checkbox" id="burger">
        <span></span>
        <span></span>
        <span></span>
    </label>
    <nav class="nav-menu">
        <ul>
            <li><a href="entry.html">new entry</a></li>
            <li><a href="edit.html">edit</a></li>
            <li><a href="visuals.html">visuals</a></li>
            <li><span class="nav-toggle" id="work-toggle">work</span>
                <ul class="nav-sub" id="work-sub">
                    <li><a href="powerapps-new.html">powerapps</a></li>
                    <li><a href="research.html">research</a></li>
                    <li><a href="resume-edit.html">resume</a></li>
                </ul>
            </li>
        </ul>
    </nav>

    <button type="button" id="back-btn" class="back-btn" aria-label="back">←</button>

    <div class="entry-container" id="list-view">
        <h1>edit</h1>
        <div id="entries-list"></div>
    </div>

    <div class="entry-container" id="editor-view">
        <h1 id="editor-title"></h1>
        <textarea id="editor-textarea"></textarea>
        <div class="editor-actions">
            <button type="button" id="save-btn" class="btn-app">save</button>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script>
        const OWNER = 'michiscoding';
        const REPO = 'michiscoding.github.io';
        const BRANCH = 'main';

        function getToken() {
            let token = localStorage.getItem('gh_token');
            if (!token) {
                token = prompt('enter your github token:');
                if (token) localStorage.setItem('gh_token', token);
            }
            return token;
        }

        const listView = document.getElementById('list-view');
        const editorView = document.getElementById('editor-view');
        const editorTitle = document.getElementById('editor-title');
        const editorTextarea = document.getElementById('editor-textarea');
        const entriesList = document.getElementById('entries-list');
        const backBtn = document.getElementById('back-btn');
        const saveBtn = document.getElementById('save-btn');

        let currentFile = null;
        let currentSha = null;

        // auto grow textarea
        editorTextarea.addEventListener('input', () => {
            if (editorTextarea.scrollHeight > editorTextarea.clientHeight) {
                editorTextarea.style.height = editorTextarea.scrollHeight + 'px';
            }
        });

        async function loadEntries() {
            const res = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/entries`);
            const files = await res.json();

            const sorted = files
                .filter(f => f.name.endsWith('.html'))
                .sort((a, b) => b.name.localeCompare(a.name));

            entriesList.innerHTML = '';

            for (const file of sorted) {
                const [yyyy, mm, dd] = file.name.replace('.html', '').split('-');
                const label = `${mm}${dd}${yyyy.slice(2)}`;

                const record = document.createElement('div');
                record.className = 'blog-record';
                record.style.cursor = 'pointer';
                record.innerHTML = `<div class="blog-details-1"><span class="blog-link">${label}</span></div>`;
                record.addEventListener('click', () => openEntry(file));
                entriesList.appendChild(record);
            }
        }

        function fadeOut(el, cb) {
            el.style.opacity = '0';
            setTimeout(() => { el.style.display = 'none'; cb(); }, 300);
        }

        function fadeIn(el) {
            el.style.display = 'block';
            requestAnimationFrame(() => el.style.opacity = '1');
        }

        async function openEntry(file) {
            const token = getToken();
            const res = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/${file.path}`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const data = await res.json();
            currentFile = file;
            currentSha = data.sha;

            // decode content and strip html wrapper to get raw text
            const html = decodeURIComponent(escape(atob(data.content.replace(/\n/g, ''))));
            const match = html.match(/<p>([\s\S]*?)<\/p>/);
            const rawText = match
                ? match[1].replace(/<br>\n?/g, '\n').replace(/<br>/g, '\n')
                : '';

            const [yyyy, mm, dd] = file.name.replace('.html', '').split('-');
            const months = ['january','february','march','april','may','june','july','august','september','october','november','december'];
            editorTitle.textContent = `${months[parseInt(mm)-1]} ${parseInt(dd)} ${yyyy}`;

            editorTextarea.value = rawText;

            fadeOut(listView, () => {
                fadeIn(editorView);
                backBtn.style.opacity = '1';
                backBtn.style.pointerEvents = 'auto';
                requestAnimationFrame(() => {
                    editorTextarea.style.height = 'auto';
                    editorTextarea.style.height = editorTextarea.scrollHeight + 'px';
                });
            });
        }

        backBtn.addEventListener('click', () => {
            backBtn.style.opacity = '0';
            backBtn.style.pointerEvents = 'none';
            fadeOut(editorView, () => {
                currentFile = null;
                currentSha = null;
                fadeIn(listView);
            });
        });

        saveBtn.addEventListener('click', async () => {
            const token = getToken();
            if (!token || !currentFile) return;

            saveBtn.textContent = 'saving...';

            const body = editorTextarea.value
                .split('\n')
                .map(line => line.trimEnd())
                .join('<br>\n');

            const [yyyy, mm, dd] = currentFile.name.replace('.html', '').split('-');
            const months = ['january','february','march','april','may','june','july','august','september','october','november','december'];
            const dateTitle = `${months[parseInt(mm)-1]} ${parseInt(dd)} ${yyyy}`;
            const dateLabel = `${mm}${dd}${yyyy.slice(2)}`;

            const parts = [
                '<!doctype html>',
                '<html lang="en">',
                '<head>',
                '    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@100..900&display=swap" rel="stylesheet">',
                '    <link rel="stylesheet" href="/css/bootstrap.min.css">',
                '    <link rel="stylesheet" href="/css/home.css">',
                '    <link rel="stylesheet" href="/css/blog.css">',
                '    <link rel="stylesheet" href="/css/entry.css">',
                '    <style>:root { --maxWidth: 67vw; }</style>',
                '    <title>' + dateLabel + '</title>',
                '</head>',
                '<body>',
                '  <button type="button" class="back-btn" onclick="history.back()">←</button>',
                '  <div class="entry-container">',
                '    <h1>' + dateTitle + '</h1>',
                '    <div class="entry-content">',
                '      <p>' + body + '</p>',
                '    </div>',
                '  </div>',
                '<' + '/body>',
                '<script src="/js/home.js"><' + '/script>',
                '<' + '/html>',
            ];
            const html = parts.join('\n');

            const encoded = btoa(unescape(encodeURIComponent(html)));

            const res = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/${currentFile.path}`, {
                method: 'PUT',
                headers: {
                    'Authorization': `Bearer ${token}`,
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    message: `edit ${currentFile.path}`,
                    content: encoded,
                    sha: currentSha,
                    branch: BRANCH,
                })
            });

            if (res.ok) {
                saveBtn.textContent = 'saved!';
                const data = await res.json();
                currentSha = data.content.sha;
                setTimeout(() => saveBtn.textContent = 'save', 2000);
            } else {
                saveBtn.textContent = 'error — check console';
                setTimeout(() => saveBtn.textContent = 'save', 3000);
            }
        });

        loadEntries();
    </script>
</body>
</html>
