<head>

          <line x1="3" y1="6" x2="21" y2="6"/>
          <line x1="3" y1="12" x2="21" y2="12"/>
          <line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
        <svg id="close-icon" xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
          <line x1="4" y1="4" x2="20" y2="20"/>
          <line x1="20" y1="4" x2="4" y2="20"/>
        </svg>
      </button>
    </div>
    <nav class="nav-menu">
        <ul>
            <li><a href="entry.html">new entry</a></li>
            <li><a href="edit.html">edit</a></li>
            <li><a href="visuals.html">visuals</a></li>
            <li><span class="nav-toggle" id="work-toggle">work</span>
                <ul class="nav-sub" id="work-sub">
                    <li><a href="powerapps-new.html">powerapps</a></li>
                    <li><a href="research.html">research</a></li>
                    <li><a href="resume-edit.html">resume</a></li>
                </ul>
            </li>
            <li><button type="button" id="dark-toggle" aria-label="toggle dark mode">☾</button></li>
        </ul>
    </nav>

    <button type="button" id="back-btn" class="back-btn" aria-label="back">←</button>

    <div class="entry-container" id="list-view">
        <h1>edit</h1>
        <div id="entries-list"></div>
    </div>

    <div class="entry-container" id="editor-view">
        <h1 id="editor-title"></h1>
        <textarea id="editor-textarea"></textarea>
        <div id="photo-strip">
            <div id="photo-previews"></div>
            <label id="photo-add-btn" for="photo-input">+ add photos</label>
            <input type="file" id="photo-input" accept="image/*,video/*" multiple>
        </div>
        <div class="editor-actions">
            <button type="button" id="save-btn" class="btn-app">save</button>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script>
        const OWNER = 'michiscoding';
        const REPO = 'michiscoding.github.io';
        const BRANCH = 'main';

        function getToken() {
            let token = localStorage.getItem('gh_token');
            if (!token) {
                token = prompt('enter your github token:');
                if (token) localStorage.setItem('gh_token', token);
            }
            return token;
        }

        const listView = document.getElementById('list-view');
        const editorView = document.getElementById('editor-view');
        const editorTitle = document.getElementById('editor-title');
        const editorTextarea = document.getElementById('editor-textarea');
        const entriesList = document.getElementById('entries-list');
        const backBtn = document.getElementById('back-btn');
        const saveBtn = document.getElementById('save-btn');

        let currentFile = null;
        let currentSha = null;

        // photos: { type: 'existing', path, src } | { type: 'new', file, base64, name }
        let photos = [];

        const photoInput = document.getElementById('photo-input');
        const photoPreviews = document.getElementById('photo-previews');

        photoInput.addEventListener('change', () => {
            Array.from(photoInput.files).forEach(addNewPhoto);
            photoInput.value = '';
        });

        function addNewPhoto(file) {
            const reader = new FileReader();
            reader.onload = e => {
                const base64Full = e.target.result;
                const entry = { type: 'new', file, base64: base64Full.split(',')[1], name: sanitizeName(file.name) };
                photos.push(entry);
                renderThumb(base64Full, entry, file.type.startsWith('video/'));
            };
            reader.readAsDataURL(file);
        }

        function addExistingPhoto(path) {
            const entry = { type: 'existing', path, src: 'https://michiscoding.github.io/' + path };
            photos.push(entry);
            renderThumb(entry.src, entry, false);
        }

        function renderThumb(src, entry, isVideo) {
            const thumb = document.createElement('div');
            thumb.className = 'photo-thumb';
            const media = document.createElement(isVideo ? 'video' : 'img');
            media.src = src;
            if (isVideo) { media.muted = true; media.loop = true; media.autoplay = true; media.playsInline = true; }
            const removeBtn = document.createElement('button');
            removeBtn.type = 'button';
            removeBtn.className = 'remove-btn';
            removeBtn.textContent = '×';
            removeBtn.addEventListener('click', () => {
                photos = photos.filter(p => p !== entry);
                thumb.remove();
            });
            thumb.appendChild(media);
            thumb.appendChild(removeBtn);
            photoPreviews.appendChild(thumb);
        }

        function sanitizeName(name) {
            return name.toLowerCase().replace(/[^a-z0-9.\-_]/g, '-');
        }

        async function uploadFile(token, path, base64) {
            let sha;
            const check = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/${path}`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            if (check.ok) sha = (await check.json()).sha;
            return fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/${path}`, {
                method: 'PUT',
                headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: `image ${path}`, content: base64, branch: BRANCH, ...(sha && { sha }) })
            });
        }

        // auto grow textarea
        editorTextarea.addEventListener('input', () => {
            if (editorTextarea.scrollHeight > editorTextarea.clientHeight) {
                editorTextarea.style.height = editorTextarea.scrollHeight + 'px';
            }
        });

        async function loadEntries() {
            const res = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/entries`);
            const files = await res.json();

            const sorted = files
                .filter(f => f.name.endsWith('.html'))
                .sort((a, b) => b.name.localeCompare(a.name));

            entriesList.innerHTML = '';

            for (const file of sorted) {
                const [yyyy, mm, dd] = file.name.replace('.html', '').split('-');
                const label = `${mm}${dd}${yyyy.slice(2)}`;

                const record = document.createElement('div');
                record.className = 'blog-record';
                record.style.cursor = 'pointer';
                record.innerHTML = `<div class="blog-details-1"><span class="blog-link">${label}</span></div>`;
                record.addEventListener('click', () => openEntry(file));
                entriesList.appendChild(record);
            }
        }

        function fadeOut(el, cb) {
            el.style.opacity = '0';
            setTimeout(() => { el.style.display = 'none'; cb(); }, 300);
        }

        function fadeIn(el) {
            el.style.display = 'block';
            requestAnimationFrame(() => el.style.opacity = '1');
        }

        async function openEntry(file) {
            const token = getToken();
            const res = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/${file.path}`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const data = await res.json();
            currentFile = file;
            currentSha = data.sha;

            // decode content and strip html wrapper to get raw text
            const html = decodeURIComponent(escape(atob(data.content.replace(/\n/g, ''))));
            const match = html.match(/<p>([\s\S]*?)<\/p>/);
            const rawText = match
                ? match[1].replace(/<br>\n?/g, '\n').replace(/<br>/g, '\n')
                : '';

            // parse existing gallery images
            photos = [];
            photoPreviews.innerHTML = '';
            const imgMatches = [...html.matchAll(/src="\/([^"]+\.(?:jpg|jpeg|png|gif|webp|mp4|webm|mov))"/gi)];
            imgMatches.forEach(m => addExistingPhoto(m[1]));

            const [yyyy, mm, dd] = file.name.replace('.html', '').split('-');
            const months = ['january','february','march','april','may','june','july','august','september','october','november','december'];
            editorTitle.textContent = `${months[parseInt(mm)-1]} ${parseInt(dd)} ${yyyy}`;

            editorTextarea.value = rawText;

            fadeOut(listView, () => {
                fadeIn(editorView);
                backBtn.style.opacity = '1';
                backBtn.style.pointerEvents = 'auto';
                requestAnimationFrame(() => {
                    editorTextarea.style.height = 'auto';
                    editorTextarea.style.height = editorTextarea.scrollHeight + 'px';
                });
            });
        }

        backBtn.addEventListener('click', () => {
            backBtn.style.opacity = '0';
            backBtn.style.pointerEvents = 'none';
            fadeOut(editorView, () => {
                currentFile = null;
                currentSha = null;
                photos = [];
                photoPreviews.innerHTML = '';
                fadeIn(listView);
            });
        });

        saveBtn.addEventListener('click', async () => {
            const token = getToken();
            if (!token || !currentFile) return;

            saveBtn.textContent = 'saving...';

            const [yyyy, mm, dd] = currentFile.name.replace('.html', '').split('-');

            // upload any new photos
            const imagePaths = [];
            for (const photo of photos) {
                if (photo.type === 'existing') {
                    imagePaths.push(photo.path);
                } else {
                    const imgPath = `entries/images/${yyyy}-${mm}-${dd}/${photo.name}`;
                    const res = await uploadFile(token, imgPath, photo.base64);
                    if (res.ok) imagePaths.push(imgPath);
                }
            }

            const body = editorTextarea.value
                .split('\n')
                .map(line => line.trimEnd())
                .join('<br>\n');

            const months = ['january','february','march','april','may','june','july','august','september','october','november','december'];
            const dateTitle = `${months[parseInt(mm)-1]} ${parseInt(dd)} ${yyyy}`;
            const dateLabel = `${mm}${dd}${yyyy.slice(2)}`;

            let galleryHTML = '';
            if (imagePaths.length) {
                const thumbs = imagePaths.map(p =>
                    `      <div class="entry-gallery-item"><img src="/${p}" loading="lazy"></div>`
                ).join('\n');
                galleryHTML = [
                    '    <div class="entry-gallery">',
                    '      <button class="gallery-arrow gallery-prev" aria-label="previous">&#8592;</button>',
                    '      <div class="gallery-track">',
                    thumbs,
                    '      </div>',
                    '      <button class="gallery-arrow gallery-next" aria-label="next">&#8594;</button>',
                    '    </div>',
                ].join('\n');
            }

            const parts = [
                '<!doctype html>',
                '<html lang="en">',
                '<head>',
                '    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@100..900&display=swap" rel="stylesheet">',
                '    <link rel="stylesheet" href="/css/bootstrap.min.css">',
                '    <link rel="stylesheet" href="/css/home.css">',
                '    <link rel="stylesheet" href="/css/blog.css">',
                '    <link rel="stylesheet" href="/css/entry.css">',
                '    <style>:root { --maxWidth: 67vw; }</style>',
                '    <title>' + dateLabel + '</title>',
                '</head>',
                '<body>',
                '  <button type="button" class="back-btn" onclick="history.back()">←</button>',
                '  <div class="entry-container">',
                '    <h1>' + dateTitle + '</h1>',
                '    <div class="entry-content">',
                '      <p>' + body + '</p>',
                '    </div>',
                galleryHTML,
                '  </div>',
                '<' + '/body>',
                '<script src="/js/home.js"><' + '/script>',
                '<' + '/html>',
            ];
            const html = parts.join('\n');

            const encoded = btoa(unescape(encodeURIComponent(html)));

            const res = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/${currentFile.path}`, {
                method: 'PUT',
                headers: {
                    'Authorization': `Bearer ${token}`,
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    message: `edit ${currentFile.path}`,
                    content: encoded,
                    sha: currentSha,
                    branch: BRANCH,
                })
            });

            if (res.ok) {
                saveBtn.textContent = 'saved!';
                const data = await res.json();
                currentSha = data.content.sha;
                setTimeout(() => saveBtn.textContent = 'save', 2000);
            } else {
                saveBtn.textContent = 'error — check console';
                setTimeout(() => saveBtn.textContent = 'save', 3000);
            }
        });

        loadEntries();
    </script>
</body>
</html>
