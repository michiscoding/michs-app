<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="css/style.css">

    <link rel="manifest" href="manifest.json">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="mishi">

<body>

    <div class="top-bar">
      <a href="https://michiscoding.github.io/home.html" id="site-link" aria-label="go to site">
        <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
          <circle cx="12" cy="12" r="3"/>
        </svg>
      </a>
      <button type="button" id="burger-btn" class="burger-btn" aria-label="menu">
        <svg id="burger-icon" xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
          <line x1="3" y1="6" x2="21" y2="6"/>
          <line x1="3" y1="12" x2="21" y2="12"/>
          <line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
        <svg id="close-icon" xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
          <line x1="4" y1="4" x2="20" y2="20"/>
          <line x1="20" y1="4" x2="4" y2="20"/>
        </svg>
      </button>
    </div>
        <nav class="nav-menu">
        <ul>
            <li><a href="entry.html">entry</a></li>
            <li><a href="visuals.html">visuals</a></li>
            <li><span class="nav-toggle" id="work-toggle">work</span>
                <ul class="nav-sub" id="work-sub">
                    <li><a href="powerapps-new.html">powerapps</a></li>
                    <li><a href="research.html">research</a></li>
                </ul>
            </li>
            <li><a href="edit.html">edit</a></li>
            <li><button type="button" id="dark-toggle" aria-label="toggle dark mode"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg></button></li>
        </ul>
    </nav>


    <div class="entry-container" id="list-view">
        <button type="button" id="list-back-btn" class="list-back-btn" aria-label="back">←</button>
        <div class="edit-tabs">
            <button type="button" class="edit-tab active" data-tab="entries">entries</button>
            <button type="button" class="edit-tab" data-tab="photos">visuals</button>
            <button type="button" class="edit-tab" data-tab="work">work</button>
        </div>

        <div id="tab-entries">
            <div id="entry-filters">
                <select id="entry-year-filter" aria-label="filter by year"></select>
                <select id="entry-month-filter" aria-label="filter by month"></select>
                <button type="button" id="entry-filter-clear">×</button>
            </div>
            <div id="entries-list"></div>
            <div id="entry-editor-view">
                <div class="field-group">
                    <span class="field-label">date</span>
                    <span id="editor-title"></span>
                </div>
                <div class="field-group">
                    <label class="field-label" for="editor-textarea">entry</label>
                    <textarea id="editor-textarea"></textarea>
                </div>
                <div id="photo-strip">
                    <div id="photo-previews"></div>
                    <label id="photo-add-btn" for="photo-input">+ add photos</label>
                    <input type="file" id="photo-input" accept="image/*,video/*" multiple>
                </div>
                <div class="editor-actions">
                    <button type="button" id="save-btn" class="btn-app">save</button>
                </div>
            </div>
        </div>

        <div id="tab-photos">
            <div class="retag-header">
                <button type="button" id="retag-save-btn" class="btn-app">save</button>
            </div>
            <div id="retag-grid"></div>
        </div>

        <div id="tab-work">
            <div class="edit-tabs edit-subtabs">
                <button type="button" class="edit-tab active" data-subtab="powerapps">powerapps</button>
                <button type="button" class="edit-tab" data-subtab="research">research</button>
                <button type="button" class="edit-tab" data-subtab="resume">resume</button>
            </div>

            <div id="subtab-powerapps">
                <div id="pa-list-view">
                    <div id="pa-records-list"></div>
                </div>
                <div id="pa-editor-view">
                    <div class="field-group">
                        <label class="field-label">title</label>
                        <input type="text" id="pa-title" placeholder="e.g. approval flow" autocomplete="off">
                    </div>
                    <div class="field-group">
                        <label class="field-label">type</label>
                        <div class="tag-pills">
                            <button type="button" class="tag-pill" data-tag="flows">flows</button>
                            <button type="button" class="tag-pill" data-tag="pages">pages</button>
                            <button type="button" class="tag-pill" data-tag="apps">apps</button>
                        </div>
                    </div>
                    <div class="field-group">
                        <label class="field-label">media</label>
                        <input type="file" id="pa-media-input" accept="image/*,video/*" multiple aria-label="media files">
                        <button type="button" class="btn-app" onclick="document.getElementById('pa-media-input').click()">choose files</button>
                        <div id="pa-media-previews"></div>
                    </div>
                    <div class="field-group">
                        <label class="field-label">what it does</label>
                        <textarea id="pa-what" placeholder="describe what this does..."></textarea>
                    </div>
                    <div class="field-group">
                        <label class="field-label">how it works</label>
                        <textarea id="pa-how" placeholder="describe the technical build..."></textarea>
                    </div>
                    <div class="editor-actions">
                        <button type="button" id="pa-delete-btn" class="danger-btn">delete</button>
                        <button type="button" id="pa-save-btn" class="btn-app">save</button>
                    </div>
                </div>
            </div>

            <div id="subtab-research">
                <div id="r-list-view">
                    <div id="r-records-list"></div>
                </div>
                <div id="r-editor-view">
                    <div class="field-group">
                        <label class="field-label">title</label>
                        <input type="text" id="r-title" placeholder="title" autocomplete="off">
                    </div>
                    <div class="field-group">
                        <textarea id="r-body" placeholder="write here..."></textarea>
                    </div>
                    <button type="button" id="r-save-btn" class="btn-app">save</button>
                </div>
            </div>

            <div id="subtab-resume">
                <div class="field-group">
                    <label class="field-label">experience</label>
                    <textarea id="exp-blurb" placeholder="e.g. creating power platform solutions for RSM since 2023..."></textarea>
                </div>
                <div class="field-group">
                    <label class="field-label">education</label>
                    <div id="edu-blocks"></div>
                    <button type="button" id="add-edu-btn" aria-label="add school">+ add school</button>
                </div>
                <div class="field-group">
                    <label class="field-label">certifications</label>
                    <textarea id="certs" placeholder="Microsoft Certified: Power Platform Developer Associate"></textarea>
                </div>
                <button type="button" id="resume-save-btn" class="btn-app">save</button>
            </div>
        </div>
    </div>


<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase.js"></script>
<script src="js/app.js"></script>
    <script>
        const MEDIA_BASE = SUPABASE_URL + '/storage/v1/object/public/media/';

        const siteLink = document.getElementById('site-link');
        function setBackVisible(visible) {
            backBtn.style.visibility = visible ? 'visible' : 'hidden';
            siteLink.style.visibility = visible ? 'hidden' : 'visible';
        }

        const editorTitle = document.getElementById('editor-title');
        const entryEditorView = document.getElementById('entry-editor-view');
        const editorTextarea = document.getElementById('editor-textarea');
        const entriesList = document.getElementById('entries-list');
        const backBtn = document.getElementById('list-back-btn');
        const saveBtn = document.getElementById('save-btn');

        let currentDate = null;
        let backContext = 'entry';

        // photos: { type: 'existing', storage_path, src } | { type: 'new', file, name }
        let photos = [];

        const photoInput = document.getElementById('photo-input');
        const photoPreviews = document.getElementById('photo-previews');

        photoInput.addEventListener('change', () => {
            Array.from(photoInput.files).forEach(addNewPhoto);
            photoInput.value = '';
        });

        function addNewPhoto(file) {
            const entry = { type: 'new', file, name: sanitizeName(file.name) };
            photos.push(entry);
            renderThumb(URL.createObjectURL(file), entry, file.type.startsWith('video/'));
        }

        function addExistingPhoto(storagePath) {
            const isVideo = /\.(mp4|webm|mov)$/i.test(storagePath);
            const entry = { type: 'existing', storage_path: storagePath, src: MEDIA_BASE + storagePath };
            photos.push(entry);
            renderThumb(entry.src, entry, isVideo);
        }

        function renderThumb(src, entry, isVideo) {
            const thumb = document.createElement('div');
            thumb.className = 'photo-thumb';
            const media = document.createElement(isVideo ? 'video' : 'img');
            media.src = src;
            if (isVideo) { media.muted = true; media.loop = true; media.autoplay = true; media.playsInline = true; }
            const removeBtn = document.createElement('button');
            removeBtn.type = 'button';
            removeBtn.className = 'remove-btn';
            removeBtn.textContent = '×';
            removeBtn.addEventListener('click', () => {
                photos = photos.filter(p => p !== entry);
                thumb.remove();
            });
            thumb.appendChild(media);
            thumb.appendChild(removeBtn);
            photoPreviews.appendChild(thumb);
        }

        function sanitizeName(name) {
            return name.toLowerCase().replace(/[^a-z0-9.\-_]/g, '-');
        }

        // auto grow textarea
        editorTextarea.addEventListener('input', () => {
            if (editorTextarea.scrollHeight > editorTextarea.clientHeight) {
                editorTextarea.style.height = editorTextarea.scrollHeight + 'px';
            }
        });

        const months = ['january','february','march','april','may','june','july','august','september','october','november','december'];
        let allEntryFiles = [];
        const yearFilter = document.getElementById('entry-year-filter');
        const monthFilter = document.getElementById('entry-month-filter');

        function renderEntryList() {
            entriesList.innerHTML = '';
            const yr = yearFilter.value;
            const mo = monthFilter.value;
            const filtered = allEntryFiles.filter(f => {
                const [yyyy, mm] = f.name.split('-');
                return (yr === 'all' || yyyy === yr) && (mo === 'all' || mm === mo);
            });
            for (const file of filtered) {
                const [yyyy, mm, dd] = file.name.replace('.html', '').split('-');
                const label = `${mm}${dd}${yyyy.slice(2)}`;
                const record = document.createElement('div');
                record.className = 'blog-record';
                record.innerHTML = `<span class="blog-link">${label}</span>`;
                record.addEventListener('click', () => openEntry(file));
                entriesList.appendChild(record);
            }
        }

        function rebuildMonthFilter() {
            const yr = yearFilter.value;
            const seenMo = new Set();
            monthFilter.innerHTML = '<option value="all">month</option>';
            allEntryFiles.forEach(f => {
                const [yyyy, mm] = f.name.split('-');
                if ((yr === 'all' || yyyy === yr) && !seenMo.has(mm)) {
                    seenMo.add(mm);
                    const opt = document.createElement('option');
                    opt.value = mm;
                    opt.textContent = months[parseInt(mm) - 1];
                    monthFilter.appendChild(opt);
                }
            });
        }

        yearFilter.addEventListener('change', () => { rebuildMonthFilter(); renderEntryList(); });
        monthFilter.addEventListener('change', renderEntryList);
        document.getElementById('entry-filter-clear').addEventListener('click', () => {
            yearFilter.value = 'all';
            rebuildMonthFilter();
            renderEntryList();
        });

        async function loadEntries() {
            const { data } = await db.from('entries').select('date').order('date', { ascending: false });
            if (!data) return;
            allEntryFiles = data.map(row => ({ name: row.date }));
            const seenYr = new Set();
            yearFilter.innerHTML = '<option value="all">year</option>';
            allEntryFiles.forEach(f => {
                const [yyyy] = f.name.split('-');
                if (!seenYr.has(yyyy)) {
                    seenYr.add(yyyy);
                    const opt = document.createElement('option');
                    opt.value = yyyy;
                    opt.textContent = yyyy;
                    yearFilter.appendChild(opt);
                }
            });
            rebuildMonthFilter();
            renderEntryList();
        }

        async function openEntry(file) {
            const date = file.name;
            const [{ data: entryData }, { data: photoData }] = await Promise.all([
                db.from('entries').select('content').eq('date', date).single(),
                db.from('entry_photos').select('storage_path').eq('entry_date', date)
            ]);
            currentDate = date;
            photos = [];
            photoPreviews.innerHTML = '';
            if (photoData) photoData.forEach(p => addExistingPhoto(p.storage_path));
            const [yyyy, mm, dd] = date.split('-');
            editorTitle.textContent = `${months[parseInt(mm)-1]} ${parseInt(dd)} ${yyyy}`;
            editorTextarea.value = entryData?.content || '';
            backContext = 'entry';
            document.getElementById('entry-filters').style.display = 'none';
            entriesList.style.display = 'none';
            entryEditorView.style.display = 'block';
            revealTab(entryEditorView);
            setBackVisible(true);
            requestAnimationFrame(() => {
                editorTextarea.style.height = 'auto';
                editorTextarea.style.height = editorTextarea.scrollHeight + 'px';
            });
        }

        // unified back button handler
        backBtn.addEventListener('click', () => {
            setBackVisible(false);

            if (backContext === 'entry') {
                entryEditorView.style.display = 'none';
                document.getElementById('entry-filters').style.display = '';
                entriesList.style.display = 'block';
                revealTab(entriesList);
                currentDate = null;
                photos = [];
                photoPreviews.innerHTML = '';
                return;
            }

            if (backContext === 'pa') {
                paEditorView.style.display = 'none';
                paListView.style.display = 'block';
                revealTab(paListView);
                paCurrentSlug = null;
                return;
            }

            if (backContext === 'r') {
                rEditorView.style.display = 'none';
                rListView.style.display = 'block';
                revealTab(rListView);
                rCurrentSlug = null;
            }
        });

        saveBtn.addEventListener('click', async () => {
            if (!currentDate) return;
            const adminDb = await getAdminClient();
            if (!adminDb) return;
            saveBtn.textContent = 'saving...';

            const existingPaths = photos.filter(p => p.type === 'existing').map(p => p.storage_path);
            const newPhotos = photos.filter(p => p.type === 'new');

            const { data: currentPhotos } = await db.from('entry_photos').select('id, storage_path').eq('entry_date', currentDate);
            if (currentPhotos) {
                for (const cp of currentPhotos.filter(cp => !existingPaths.includes(cp.storage_path))) {
                    await adminDb.from('entry_photos').delete().eq('id', cp.id);
                }
            }

            const newPaths = [];
            for (const photo of newPhotos) {
                const path = `entry-photos/${currentDate}/${photo.name}`;
                const { error } = await adminDb.storage.from('media').upload(path, photo.file, { upsert: true });
                if (!error) newPaths.push(path);
            }

            const { error } = await adminDb.from('entries').upsert(
                { date: currentDate, content: editorTextarea.value },
                { onConflict: 'date' }
            );
            if (newPaths.length) {
                await adminDb.from('entry_photos').insert(newPaths.map(p => ({ entry_date: currentDate, storage_path: p })));
            }

            if (error) {
                saveBtn.textContent = 'error — check console';
                console.error(error);
                setTimeout(() => saveBtn.textContent = 'save', 3000);
                return;
            }
            saveBtn.textContent = 'saved!';
            setTimeout(() => saveBtn.textContent = 'save', 2000);
        });

        loadEntries();

        // --- tabs ---
        const tabEntries = document.getElementById('tab-entries');
        const tabPhotos = document.getElementById('tab-photos');
        const tabWork = document.getElementById('tab-work');
        const tabs = document.querySelectorAll('.edit-tab:not(.edit-subtabs .edit-tab)');
        let photosTabLoaded = false;
        let paListLoaded = false, rListLoaded = false;

        function revealTab(el) {
            el.style.opacity = '0';
            requestAnimationFrame(() => requestAnimationFrame(() => { el.style.opacity = '1'; }));
        }

        function showTab(name) {
            tabEntries.style.display = name === 'entries' ? '' : 'none';
            tabPhotos.style.display = name === 'photos' ? 'block' : 'none';
            tabWork.style.display = name === 'work' ? 'block' : 'none';
            const active = name === 'entries' ? tabEntries : name === 'photos' ? tabPhotos : tabWork;
            revealTab(active);
            if (name === 'photos' && !photosTabLoaded) { photosTabLoaded = true; loadRetag(); }
            if (name === 'work') {
                if (!paListLoaded) { paListLoaded = true; loadPaList(); }
                loadResume();
            }
        }

        tabs.forEach(tab => {
            tab.addEventListener('click', () => {
                tabs.forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                showTab(tab.dataset.tab);
            });
        });

        // --- subtabs ---
        const subtabEls = {
            powerapps: document.getElementById('subtab-powerapps'),
            research: document.getElementById('subtab-research'),
            resume: document.getElementById('subtab-resume'),
        };
        const subtabs = document.querySelectorAll('.edit-subtabs .edit-tab');

        subtabs.forEach(tab => {
            tab.addEventListener('click', () => {
                subtabs.forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                Object.entries(subtabEls).forEach(([k, el]) => {
                    const show = k === tab.dataset.subtab;
                    el.style.display = show ? 'block' : 'none';
                    if (show) revealTab(el);
                });
                // collapse any open editor back to its list
                if (paEditorView.style.display === 'block') {
                    paEditorView.style.display = 'none';
                    paListView.style.display = 'block';
                    paCurrentSlug = null;
                }
                if (rEditorView.style.display === 'block') {
                    rEditorView.style.display = 'none';
                    rListView.style.display = 'block';
                    rCurrentSlug = null;
                }
                setBackVisible(false);
                if (tab.dataset.subtab === 'powerapps' && !paListLoaded) { paListLoaded = true; loadPaList(); }
                if (tab.dataset.subtab === 'research' && !rListLoaded) { rListLoaded = true; loadRList(); }
                if (tab.dataset.subtab === 'resume') {
                    requestAnimationFrame(() => requestAnimationFrame(() => {
                        ['exp-blurb', 'certs'].forEach(id => {
                            const ta = document.getElementById(id);
                            ta.style.height = 'auto';
                            ta.style.height = ta.scrollHeight + 'px';
                        });
                    }));
                }
            });
        });

        // --- retag ---
        const ALL_TAGS = ['home', 'nature', 'jiu-jitsu', 'vsco', 'friends', 'me', 'tattoos'];
        const retagGrid = document.getElementById('retag-grid');
        const retagSaveBtn = document.getElementById('retag-save-btn');
        let retagPhotos = [];
        let deletedPhotoIds = new Set();

        async function loadRetag() {
            retagGrid.innerHTML = '<p style="opacity:0.4;font-size:0.85rem">loading...</p>';
            const { data, error } = await db.from('photos').select('*').order('date', { ascending: false });
            if (error || !data) { retagGrid.innerHTML = '<p style="opacity:0.4;font-size:0.85rem">none yet</p>'; return; }
            retagPhotos = data.map(p => ({ ...p, tags: p.tags || [] }));
            deletedPhotoIds = new Set();
            retagGrid.innerHTML = '';
            retagPhotos.forEach((photo, idx) => {
                const card = document.createElement('div');
                card.className = 'retag-card';
                const img = document.createElement('img');
                img.src = photo.storage_path.startsWith('http') ? photo.storage_path : MEDIA_BASE + photo.storage_path;
                const delBtn = document.createElement('button');
                delBtn.type = 'button';
                delBtn.className = 'remove-btn';
                delBtn.textContent = '×';
                delBtn.addEventListener('click', () => {
                    deletedPhotoIds.add(photo.id);
                    card.remove();
                });
                const picker = document.createElement('div');
                picker.className = 'tag-picker';
                const currentTags = new Set(photo.tags);
                ALL_TAGS.forEach(tag => {
                    const btn = document.createElement('button');
                    btn.type = 'button';
                    btn.className = 'tag-btn' + (currentTags.has(tag) ? ' active' : '');
                    btn.textContent = tag;
                    btn.addEventListener('click', () => {
                        if (currentTags.has(tag)) { currentTags.delete(tag); btn.classList.remove('active'); }
                        else { currentTags.add(tag); btn.classList.add('active'); }
                        retagPhotos[idx].tags = [...currentTags];
                    });
                    picker.appendChild(btn);
                });
                const dateInput = document.createElement('input');
                dateInput.type = 'date';
                dateInput.className = 'date-input';
                dateInput.value = photo.date || '';
                dateInput.addEventListener('change', () => { retagPhotos[idx].date = dateInput.value; });
                const imgWrap = document.createElement('div');
                imgWrap.className = 'retag-img-wrap';
                imgWrap.appendChild(img);
                imgWrap.appendChild(delBtn);
                imgWrap.appendChild(picker);
                card.appendChild(imgWrap);
                card.appendChild(dateInput);
                retagGrid.appendChild(card);
            });
        }

        retagSaveBtn.addEventListener('click', async () => {
            const adminDb = await getAdminClient();
            if (!adminDb) return;
            retagSaveBtn.textContent = 'saving...';
            retagSaveBtn.disabled = true;
            for (const id of deletedPhotoIds) {
                await adminDb.from('photos').delete().eq('id', id);
            }
            for (const photo of retagPhotos.filter(p => !deletedPhotoIds.has(p.id))) {
                await adminDb.from('photos').update({ tags: photo.tags, date: photo.date }).eq('id', photo.id);
            }
            retagSaveBtn.textContent = 'saved!';
            deletedPhotoIds = new Set();
            setTimeout(() => { retagSaveBtn.textContent = 'save'; retagSaveBtn.disabled = false; }, 2000);
        });

        // --- shared helpers ---
        function slugify(title) {
            return title.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)/g, '');
        }

        // --- powerapps ---
        let paMediaFiles = [], paSelectedTags = new Set(), paCurrentSlug = null, paExistingMedia = [];

        document.querySelectorAll('.tag-pill').forEach(pill => {
            pill.addEventListener('click', () => {
                if (paSelectedTags.has(pill.dataset.tag)) {
                    paSelectedTags.delete(pill.dataset.tag);
                    pill.classList.remove('selected');
                } else {
                    paSelectedTags.add(pill.dataset.tag);
                    pill.classList.add('selected');
                }
            });
        });

        document.getElementById('pa-media-input').addEventListener('change', e => {
            paMediaFiles = Array.from(e.target.files);
            const previews = document.getElementById('pa-media-previews');
            previews.innerHTML = '';
            paMediaFiles.forEach(file => {
                const url = URL.createObjectURL(file);
                let el;
                if (file.type.startsWith('video/')) {
                    el = document.createElement('video');
                    el.src = url; el.muted = true; el.autoplay = true; el.loop = true; el.playsInline = true;
                } else {
                    el = document.createElement('img');
                    el.src = url; el.alt = file.name;
                }
                el.style.cssText = 'width:100%;border-radius:8px;margin-top:0.5rem;display:block;';
                previews.appendChild(el);
            });
        });

        const paListView = document.getElementById('pa-list-view');
        const paEditorView = document.getElementById('pa-editor-view');
        paEditorView.style.display = 'none';

        async function loadPaList() {
            const list = document.getElementById('pa-records-list');
            list.innerHTML = '<p style="opacity:0.4;font-size:0.85rem">loading...</p>';
            const { data, error } = await db.from('powerapps').select('slug, title').order('created_at', { ascending: false });
            list.innerHTML = '';
            if (error || !data?.length) { list.innerHTML = '<p style="opacity:0.4;font-size:0.85rem">none yet</p>'; return; }
            data.forEach(entry => {
                const record = document.createElement('div');
                record.className = 'blog-record';
                record.innerHTML = `<span class="blog-link">${entry.title}</span>`;
                record.addEventListener('click', () => openPaEditor(entry.slug));
                list.appendChild(record);
            });
        }

        async function openPaEditor(slug) {
            const { data, error } = await db.from('powerapps').select('*').eq('slug', slug).single();
            if (error || !data) return;
            paCurrentSlug = slug;
            paExistingMedia = data.media || [];
            paMediaFiles = [];
            document.getElementById('pa-media-input').value = '';
            const previews = document.getElementById('pa-media-previews');
            previews.innerHTML = '';
            paExistingMedia.forEach(path => {
                const src = MEDIA_BASE + path;
                let el;
                if (/\.(mp4|webm|mov)$/i.test(path)) {
                    el = document.createElement('video');
                    el.src = src; el.muted = true; el.autoplay = true; el.loop = true; el.playsInline = true;
                } else {
                    el = document.createElement('img');
                    el.src = src; el.alt = '';
                }
                el.style.cssText = 'width:100%;border-radius:8px;margin-top:0.5rem;display:block;';
                previews.appendChild(el);
            });
            document.getElementById('pa-title').value = data.title || '';
            const paWhat = document.getElementById('pa-what');
            const paHow = document.getElementById('pa-how');
            paWhat.value = data.what || '';
            paHow.value = data.how || '';
            requestAnimationFrame(() => {
                [paWhat, paHow].forEach(ta => {
                    ta.style.height = 'auto';
                    ta.style.height = ta.scrollHeight + 'px';
                });
            });
            paSelectedTags = new Set(data.tags || []);
            document.querySelectorAll('.tag-pill').forEach(p => {
                p.classList.toggle('selected', paSelectedTags.has(p.dataset.tag));
            });
            backContext = 'pa';
            paListView.style.display = 'none';
            paEditorView.style.display = 'block';
            revealTab(paEditorView);
            setBackVisible(true);
        }

        document.getElementById('pa-save-btn').addEventListener('click', async () => {
            const title = document.getElementById('pa-title').value.trim();
            if (!title || !paCurrentSlug) return;
            const adminDb = await getAdminClient();
            if (!adminDb) return;
            const btn = document.getElementById('pa-save-btn');
            btn.textContent = 'saving...'; btn.disabled = true;
            const newSlug = slugify(title);
            let mediaPaths = paMediaFiles.length > 0 ? [] : [...paExistingMedia];
            if (paMediaFiles.length > 0) {
                for (let i = 0; i < paMediaFiles.length; i++) {
                    const file = paMediaFiles[i];
                    const ext = file.name.split('.').pop() || 'jpg';
                    const filename = paMediaFiles.length === 1 ? `${newSlug}.${ext}` : `${newSlug}-${i+1}.${ext}`;
                    const path = `powerapps/${filename}`;
                    const { error } = await adminDb.storage.from('media').upload(path, file, { upsert: true });
                    if (!error) mediaPaths.push(path);
                }
            }
            const what = document.getElementById('pa-what').value;
            const how = document.getElementById('pa-how').value;
            const tags = [...paSelectedTags];
            if (newSlug !== paCurrentSlug) {
                await adminDb.from('powerapps').delete().eq('slug', paCurrentSlug);
            }
            const { error } = await adminDb.from('powerapps').upsert(
                { slug: newSlug, title, tags, what, how, media: mediaPaths },
                { onConflict: 'slug' }
            );
            if (error) {
                console.error(error);
                btn.textContent = 'error';
            } else {
                paCurrentSlug = newSlug;
                paExistingMedia = mediaPaths;
                btn.textContent = 'saved!';
            }
            setTimeout(() => { btn.textContent = 'save'; btn.disabled = false; }, 2000);
        });

        document.getElementById('pa-delete-btn').addEventListener('click', async () => {
            if (!paCurrentSlug) return;
            const adminDb = await getAdminClient();
            if (!adminDb) return;
            const btn = document.getElementById('pa-delete-btn');
            btn.textContent = 'deleting...';
            await adminDb.from('powerapps').delete().eq('slug', paCurrentSlug);
            paCurrentSlug = null;
            paEditorView.style.display = 'none';
            paListView.style.display = 'block';
            setBackVisible(false);
            paListLoaded = false;
            loadPaList();
        });

        // --- research ---
        let rCurrentSlug = null;
        const rListView = document.getElementById('r-list-view');
        const rEditorView = document.getElementById('r-editor-view');
        rEditorView.style.display = 'none';

        ['pa-what', 'pa-how', 'r-body'].forEach(id => {
            document.getElementById(id).addEventListener('input', function() {
                if (this.scrollHeight > this.clientHeight) this.style.height = this.scrollHeight + 'px';
            });
        });

        async function loadRList() {
            document.getElementById('r-records-list').innerHTML = '<p style="opacity:0.4;font-size:0.85rem">loading...</p>';
            const { data, error } = await db.from('research').select('slug, title').order('created_at', { ascending: false });
            const list = document.getElementById('r-records-list');
            list.innerHTML = '';
            if (error || !data?.length) { list.innerHTML = '<p style="opacity:0.4;font-size:0.85rem">none yet</p>'; return; }
            data.forEach(entry => {
                const record = document.createElement('div');
                record.className = 'blog-record';
                record.innerHTML = `<span class="blog-link">${entry.title}</span>`;
                record.addEventListener('click', () => openREditor(entry.slug));
                list.appendChild(record);
            });
        }

        async function openREditor(slug) {
            const { data, error } = await db.from('research').select('*').eq('slug', slug).single();
            if (error || !data) return;
            rCurrentSlug = slug;
            document.getElementById('r-title').value = data.title || '';
            document.getElementById('r-body').value = data.body || '';
            requestAnimationFrame(() => {
                const ta = document.getElementById('r-body');
                ta.style.height = 'auto';
                ta.style.height = ta.scrollHeight + 'px';
            });
            backContext = 'r';
            rListView.style.display = 'none';
            rEditorView.style.display = 'block';
            revealTab(rEditorView);
            setBackVisible(true);
        }

        document.getElementById('r-save-btn').addEventListener('click', async () => {
            const title = document.getElementById('r-title').value.trim();
            if (!title || !rCurrentSlug) return;
            const adminDb = await getAdminClient();
            if (!adminDb) return;
            const btn = document.getElementById('r-save-btn');
            btn.textContent = 'saving...'; btn.disabled = true;
            const newSlug = slugify(title);
            if (newSlug !== rCurrentSlug) {
                await adminDb.from('research').delete().eq('slug', rCurrentSlug);
            }
            const { error } = await adminDb.from('research').upsert(
                { slug: newSlug, title, body: document.getElementById('r-body').value },
                { onConflict: 'slug' }
            );
            if (error) {
                console.error(error);
                btn.textContent = 'error';
            } else {
                rCurrentSlug = newSlug;
                btn.textContent = 'saved!';
            }
            setTimeout(() => { btn.textContent = 'save'; btn.disabled = false; }, 2000);
        });

        // --- resume (stays on GitHub) ---
        const OWNER = 'michiscoding';
        const REPO = 'michiscoding.github.io';
        const BRANCH = 'main';
        const RESUME_PATH = 'work/resume.html';
        let resumeLoaded = false;

        function getToken() {
            let token = localStorage.getItem('gh_token');
            if (!token) {
                token = prompt('enter your github token (for resume):');
                if (token) localStorage.setItem('gh_token', token);
            }
            return token;
        }

        function addEduBlock(data = {}) {
            const container = document.getElementById('edu-blocks');
            const block = document.createElement('div');
            block.className = 'edu-block-form';
            block.innerHTML = `
                <input type="text" class="edu-school" placeholder="school name" autocomplete="off" value="${data.school || ''}">
                <div class="field-row">
                    <input type="text" class="edu-program" placeholder="degree / program" autocomplete="off" value="${data.program || ''}">
                    <input type="text" class="edu-location-input" placeholder="city, state" autocomplete="off" value="${data.location || ''}">
                    <input type="text" class="edu-date-input" placeholder="may 2023" autocomplete="off" value="${data.date || ''}">
                </div>
                <textarea class="edu-courses" placeholder="relevant coursework...">${data.courses || ''}</textarea>
                <button type="button" class="remove-edu-btn">remove</button>
            `;
            block.querySelector('.remove-edu-btn').addEventListener('click', () => block.remove());
            block.querySelector('.edu-courses').addEventListener('input', function() {
                if (this.scrollHeight > this.clientHeight) this.style.height = this.scrollHeight + 'px';
            });
            container.appendChild(block);
        }

        document.getElementById('add-edu-btn').addEventListener('click', () => addEduBlock());

        async function loadResume() {
            if (resumeLoaded) return;
            const token = getToken(); if (!token) return;
            const btn = document.getElementById('resume-save-btn');
            btn.textContent = 'loading...';
            try {
                const apiRes = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/${RESUME_PATH}`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (!apiRes.ok) { btn.textContent = 'save'; return; }
                const apiData = await apiRes.json();
                const rawRes = await fetch(apiData.download_url);
                const html = await rawRes.text();
                btn.textContent = 'save';
                resumeLoaded = true;
                const doc = new DOMParser().parseFromString(html, 'text/html');
                doc.querySelectorAll('.resume-section').forEach(section => {
                    const label = section.querySelector('h2')?.textContent.trim().toLowerCase();
                    if (label === 'experience') {
                        const blurb = Array.from(section.querySelectorAll('.entry-content p')).find(p => !p.querySelector('a'));
                        const ta = document.getElementById('exp-blurb');
                        ta.value = blurb ? blurb.textContent.trim() : '';
                    }
                    if (label === 'education') {
                        document.getElementById('edu-blocks').innerHTML = '';
                        section.querySelectorAll('.edu-block').forEach(block => {
                            const meta = block.querySelector('.edu-meta')?.textContent || '';
                            const locParts = meta.split('·');
                            addEduBlock({
                                school: block.querySelector('.edu-school')?.textContent.trim() || '',
                                program: block.querySelector('.edu-degree')?.textContent.trim() || '',
                                location: locParts[0]?.trim() || '',
                                date: locParts[1]?.trim() || '',
                                courses: block.querySelector('.edu-courses')?.textContent.trim() || '',
                            });
                        });
                    }
                    if (label === 'certifications') {
                        const ta = document.getElementById('certs');
                        const items = section.querySelectorAll('.cert-list li, .entry-content i');
                        ta.value = Array.from(items).map(el => el.textContent.trim()).join('\n');
                    }
                });

                // resize after subtab becomes visible
                requestAnimationFrame(() => requestAnimationFrame(() => {
                    ['exp-blurb', 'certs'].forEach(id => {
                        const ta = document.getElementById(id);
                        ta.style.height = 'auto';
                        ta.style.height = ta.scrollHeight + 'px';
                    });
                }));
            } catch(e) { console.error(e); document.getElementById('resume-save-btn').textContent = 'save'; }
        }

        document.getElementById('exp-blurb').addEventListener('input', function() {
            if (this.scrollHeight > this.clientHeight) this.style.height = this.scrollHeight + 'px';
        });
        document.getElementById('certs').addEventListener('input', function() {
            if (this.scrollHeight > this.clientHeight) this.style.height = this.scrollHeight + 'px';
        });

        document.getElementById('resume-save-btn').addEventListener('click', async () => {
            const token = getToken(); if (!token) return;
            const eduBlocks = document.querySelectorAll('.edu-block-form');
            const btn = document.getElementById('resume-save-btn');
            btn.textContent = 'saving...'; btn.disabled = true;
            const certItems = document.getElementById('certs').value.split('\n').map(l=>l.trim()).filter(Boolean).map(l=>`          <li><i>${l}</i></li>`).join('\n');
            const eduHTML = Array.from(eduBlocks).map(block => {
                const school = block.querySelector('.edu-school').value.trim();
                const program = block.querySelector('.edu-program').value.trim();
                const location = block.querySelector('.edu-location-input').value.trim();
                const date = block.querySelector('.edu-date-input').value.trim();
                const courses = block.querySelector('.edu-courses').value.trim();
                const lines = [`        <div class="edu-block"><div class="edu-header"><span class="edu-school">${school}</span><span class="edu-meta">${location} · ${date}</span></div>`];
                if (program) lines.push(`          <div class="edu-degree">${program}</div>`);
                if (courses) lines.push(`          <div class="edu-courses">${courses}</div>`);
                lines.push('        </div>');
                return lines.join('\n');
            }).join('\n');
            const expBlurb = document.getElementById('exp-blurb').value.trim();
            const html = [
                '<!doctype html><html lang="en"><head>',
                '    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">',
                '    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@100..900&display=swap" rel="stylesheet">',
                '    <link rel="stylesheet" href="/css/bootstrap.min.css">',
                '    <link rel="stylesheet" href="/css/home.css"><link rel="stylesheet" href="/css/entry.css"><link rel="stylesheet" href="/css/resume.css">',
                '    <style>:root{--maxWidth:67vw;}</style><title>resume</title></head><body>',
                '  <div class="entry-container"><h1>resume</h1>',
                '    <div class="resume-section"><h2>experience</h2><div class="entry-content">',
                `      <p>${expBlurb}</p><p>→ <a class="resume-link" href="/work/powerapps.html">see the work</a></p>`,
                '    </div></div>',
                '    <div class="resume-section"><h2>education</h2><div class="entry-content">',
                eduHTML,
                '    </div></div>',
                '    <div class="resume-section"><h2>certifications</h2><div class="entry-content"><ul class="cert-list">',
                certItems,
                '    </ul></div></div>',
                '  </div><\/body><script src="/js/home.js"><\/script><\/html>',
            ].join('\n');
            const encoded = btoa(unescape(encodeURIComponent(html)));
            const check = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/${RESUME_PATH}`, { headers: { 'Authorization': `Bearer ${token}` } });
            const existing = await check.json();
            const res = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/${RESUME_PATH}`, {
                method: 'PUT',
                headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: 'update resume', content: encoded, sha: existing.sha, branch: BRANCH })
            });
            if (res.ok) { btn.textContent = 'saved!'; setTimeout(() => { btn.textContent = 'save'; btn.disabled = false; }, 2000); }
            else { btn.textContent = 'error'; btn.disabled = false; }
        });
    </script>
</body>
</html>
