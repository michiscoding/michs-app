<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mishi</title>
    <link rel="manifest" href="manifest.json">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="mishi">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #fff;
            opacity: 0;
            transition: opacity 0.8s ease;
        }

        #pencil-btn {
            background: none;
            border: none;
            cursor: pointer;
            color: #bbb;
            padding: 0;
            outline: none;
            transition: color 0.3s ease, opacity 0.6s ease;
        }

        #pencil-btn:hover { color: #888; }
    </style>
</head>
<body>
    <button type="button" id="pencil-btn" aria-label="open app">
        <svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 20h9"/>
            <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/>
        </svg>
    </button>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            document.body.style.opacity = '1';
        });

        document.getElementById('pencil-btn').addEventListener('click', () => {
            document.body.style.opacity = '0';
            setTimeout(() => { window.location.href = 'edit.html'; }, 600);
        });
    </script>
</body>
</html>
