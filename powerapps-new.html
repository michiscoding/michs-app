    <style>
        .field-group { margin-bottom: 1.5rem; }
        .field-group label {
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #aaa;
            display: block;
            margin-bottom: 0.5rem;
        }
        .field-group input[type="text"] {
            width: 100%;
            background: #ededed;
            border: none;
            border-radius: 8px;
            padding: 0.75rem 1rem;
            font-family: inherit;
            font-size: 1rem;
            color: #111;
            outline: none;
        }
        .field-group textarea { min-height: 100px; }

        .tag-pills {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .tag-pill {
            background: #ededed;
            border: none;
            border-radius: 999px;
            padding: 0.3rem 1rem;
            font-family: inherit;
            font-size: 0.8rem;
            font-weight: 600;
            color: #aaa;
            cursor: pointer;
            transition: all 0.2s;
        }

        .tag-pill.selected {
            background: #222;
            color: #fff;
        }

        .media-scroll-row {
            display: flex;
            gap: 0.5rem;
            overflow-x: auto;
            margin-top: 0.75rem;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }
        .media-scroll-row::-webkit-scrollbar { display: none; }
        .media-thumb-wrap {
            position: relative;
            flex: 0 0 auto;
            width: 140px;
        }
        .media-thumb {
            width: 140px;
            height: 110px;
            object-fit: cover;
            border-radius: 8px;
            display: block;
        }
    </style>
</head>

<body>

    <div class="entry-container">
        <h1>new powerapps entry</h1>

        <div class="field-group">
            <label>title</label>
            <input type="text" id="pa-title" placeholder="e.g. approval flow" autocomplete="off">
        </div>

        <div class="field-group">
            <label>type</label>
            <div class="tag-pills">
                <button type="button" class="tag-pill" data-tag="flows">flows</button>
                <button type="button" class="tag-pill" data-tag="pages">pages</button>
                <button type="button" class="tag-pill" data-tag="apps">apps</button>
            </div>
        </div>

        <div class="field-group">
            <label>media</label>
            <input type="file" id="media-input" accept="image/*,video/*" multiple style="display:none">
            <button type="button" class="btn-app" onclick="document.getElementById('media-input').click()">choose files</button>
            <div id="media-previews" class="media-scroll-row"></div>
        </div>

        <div class="field-group">
            <label>what it does</label>
            <textarea id="pa-what" placeholder="describe what this does..."></textarea>
        </div>

        <div class="field-group">
            <label>how it works</label>
            <textarea id="pa-how" placeholder="describe the technical build..."></textarea>
        </div>

        <button type="button" id="post-btn" class="btn-app">post</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>
    <script src="js/app.js"></script>
    <script>
        // auto-grow textareas
        ['pa-what', 'pa-how'].forEach(id => {
            document.getElementById(id).addEventListener('input', function() {
                this.style.height = 'auto';
                this.style.height = this.scrollHeight + 'px';
            });
        });

        // tag selection
        let selectedTags = new Set();
        document.querySelectorAll('.tag-pill').forEach(pill => {
            pill.addEventListener('click', () => {
                if (selectedTags.has(pill.dataset.tag)) {
                    selectedTags.delete(pill.dataset.tag);
                    pill.classList.remove('selected');
                } else {
                    selectedTags.add(pill.dataset.tag);
                    pill.classList.add('selected');
                }
            });
        });

        let mediaFiles = [];

        document.getElementById('media-input').addEventListener('change', e => {
            Array.from(e.target.files).forEach(addMediaFile);
            e.target.value = '';
        });

        function addMediaFile(file) {
            mediaFiles.push(file);
            const previews = document.getElementById('media-previews');
            const url = URL.createObjectURL(file);
            const wrap = document.createElement('div');
            wrap.className = 'media-thumb-wrap';
            let el;
            if (file.type.startsWith('video/')) {
                el = document.createElement('video');
                el.src = url; el.muted = true; el.autoplay = true; el.loop = true; el.playsInline = true;
            } else {
                el = document.createElement('img');
                el.src = url; el.alt = file.name;
            }
            el.className = 'media-thumb';
            const removeBtn = document.createElement('button');
            removeBtn.type = 'button';
            removeBtn.className = 'remove-btn';
            removeBtn.textContent = '×';
            removeBtn.addEventListener('click', () => {
                mediaFiles = mediaFiles.filter(f => f !== file);
                wrap.remove();
            });
            wrap.appendChild(el);
            wrap.appendChild(removeBtn);
            previews.appendChild(wrap);
        }

        function slugify(title) {
            return title.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)/g, '');
        }

        function getDate() {
            const months = ['january','february','march','april','may','june','july','august','september','october','november','december'];
            const d = new Date();
            return `${months[d.getMonth()]} ${d.getDate()} ${d.getFullYear()}`;
        }

        document.getElementById('post-btn').addEventListener('click', async () => {
            const title = document.getElementById('pa-title').value.trim();
            if (!title) { document.getElementById('pa-title').focus(); return; }

            const adminDb = await getAdminClient();
            if (!adminDb) return;

            const btn = document.getElementById('post-btn');
            btn.textContent = 'posting...';

            const slug = slugify(title);
            const what = document.getElementById('pa-what').value;
            const how = document.getElementById('pa-how').value;
            const tags = [...selectedTags];
            const mediaPaths = [];

            for (let i = 0; i < mediaFiles.length; i++) {
                const file = mediaFiles[i];
                const ext = file.name.split('.').pop() || 'jpg';
                const filename = mediaFiles.length === 1 ? `${slug}.${ext}` : `${slug}-${i+1}.${ext}`;
                const path = `powerapps/${filename}`;
                const { error } = await adminDb.storage.from('media').upload(path, file, { upsert: true });
                if (!error) mediaPaths.push(path);
            }

            const { error } = await adminDb.from('powerapps').upsert(
                { slug, title, tags, what, how, media: mediaPaths },
                { onConflict: 'slug' }
            );

            if (error) {
                console.error(error);
                btn.textContent = 'error — check console';
                setTimeout(() => btn.textContent = 'post', 3000);
                return;
            }

            btn.textContent = 'posted!';
            setTimeout(() => btn.textContent = 'post', 2000);
        });
    </script>
</body>
