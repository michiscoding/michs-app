<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

    <style>
        .field-group { margin-bottom: 1.5rem; }
        .field-group label {
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #aaa;
            display: block;
            margin-bottom: 0.5rem;
        }
        .field-group input[type="text"] {
            width: 100%;
            background: #ededed;
            border: none;
            border-radius: 8px;
            padding: 0.75rem 1rem;
            font-family: inherit;
            font-size: 1rem;
            color: #111;
            outline: none;
        }
        .field-group textarea { min-height: 100px; }

        .tag-pills {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .tag-pill {
            background: #ededed;
            border: none;
            border-radius: 999px;
            padding: 0.3rem 1rem;
            font-family: inherit;
            font-size: 0.8rem;
            font-weight: 600;
            color: #aaa;
            cursor: pointer;
            transition: all 0.2s;
        }

        .tag-pill.selected {
            background: #222;
            color: #fff;
        }

        #media-preview {
            width: 100%;
            border-radius: 8px;
            margin-top: 0.75rem;
            display: none;
        }
    </style>
</head>

<body>

        </svg>

    </div>
        <nav class="nav-menu">

            <li><a href="entry.html">entry</a></li>

                <ul class="nav-sub" id="work-sub">

    <div class="entry-container">
        <h1>new powerapps entry</h1>

        <div class="field-group">
            <label>title</label>
            <input type="text" id="pa-title" placeholder="e.g. approval flow" autocomplete="off">
        </div>

        <div class="field-group">
            <label>type</label>
            <div class="tag-pills">
                <button type="button" class="tag-pill" data-tag="flows">flows</button>
                <button type="button" class="tag-pill" data-tag="pages">pages</button>
                <button type="button" class="tag-pill" data-tag="apps">apps</button>
            </div>
        </div>

        <div class="field-group">
            <label>media</label>
            <input type="file" id="media-input" accept="image/*,video/*" multiple style="display:none">
            <button type="button" class="btn-app" onclick="document.getElementById('media-input').click()">choose files</button>
            <div id="media-previews"></div>
        </div>

        <div class="field-group">
            <label>what it does</label>
            <textarea id="pa-what" placeholder="describe what this does..."></textarea>
        </div>

        <div class="field-group">
            <label>how it works</label>
            <textarea id="pa-how" placeholder="describe the technical build..."></textarea>
        </div>

        <button type="button" id="post-btn" class="btn-app">post</button>
    </div>

    <script src="js/app.js"></script>
    <script>
        const OWNER = 'michiscoding';
        const REPO = 'michiscoding.github.io';
        const BRANCH = 'main';

        // auto-grow textareas
        ['pa-what', 'pa-how'].forEach(id => {
            document.getElementById(id).addEventListener('input', function() {
                this.style.height = 'auto';
                this.style.height = this.scrollHeight + 'px';
            });
        });

        // tag selection
        let selectedTags = new Set();
        document.querySelectorAll('.tag-pill').forEach(pill => {
            pill.addEventListener('click', () => {
                if (selectedTags.has(pill.dataset.tag)) {
                    selectedTags.delete(pill.dataset.tag);
                    pill.classList.remove('selected');
                } else {
                    selectedTags.add(pill.dataset.tag);
                    pill.classList.add('selected');
                }
            });
        });

        let mediaFiles = [];

        document.getElementById('media-input').addEventListener('change', e => {
            mediaFiles = Array.from(e.target.files);
            const previews = document.getElementById('media-previews');
            previews.innerHTML = '';
            mediaFiles.forEach(file => {
                const url = URL.createObjectURL(file);
                let el;
                if (file.type === 'video/mp4') {
                    el = document.createElement('video');
                    el.src = url; el.muted = true; el.autoplay = true; el.loop = true; el.playsInline = true;
                } else {
                    el = document.createElement('img');
                    el.src = url; el.alt = file.name;
                }
                el.style.cssText = 'width:100%;border-radius:8px;margin-top:0.5rem;display:block;';
                previews.appendChild(el);
            });
        });

        function getToken() {
            let token = localStorage.getItem('gh_token');
            if (!token) {
                token = prompt('enter your github token:');
                if (token) localStorage.setItem('gh_token', token);
            }
            return token;
        }

        function slugify(title) {
            return title.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)/g, '');
        }

        function getDate() {
            const months = ['january','february','march','april','may','june','july','august','september','october','november','december'];
            const d = new Date();
            return `${months[d.getMonth()]} ${d.getDate()} ${d.getFullYear()}`;
        }

        function buildDetailHTML(title, tag, what, how, mediaSrcs) {
            let mediaEl = '';
            if (mediaSrcs.length === 1) {
                const src = mediaSrcs[0];
                mediaEl = src.endsWith('.mp4')
                    ? '<video class="pa-media" muted autoplay loop playsinline><source src="' + src + '" type="video/mp4"></video>'
                    : '<img class="pa-media" alt="' + title + '" src="' + src + '">';
            } else if (mediaSrcs.length > 1) {
                const slides = mediaSrcs.map((src, i) =>
                    src.endsWith('.mp4')
                        ? '<video class="pa-slide"' + (i===0?' style="opacity:1"':'') + ' muted autoplay loop playsinline><source src="' + src + '" type="video/mp4"></video>'
                        : '<img class="pa-slide"' + (i===0?' style="opacity:1"':'') + ' alt="' + title + '" src="' + src + '">'
                ).join('\n        ');
                mediaEl = '<div class="pa-slideshow">\n        ' + slides + '\n      </div>';
            }

            const parts = [
                '<!doctype html>',
                '<html lang="en">',
                '<head>',
                '    <meta charset="UTF-8">',
                '    <meta name="viewport" content="width=device-width, initial-scale=1.0">',
                '    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@100..900&display=swap" rel="stylesheet">',
                '    <link rel="stylesheet" href="/css/bootstrap.min.css">',
                '    <link rel="stylesheet" href="/css/home.css">',
                '    <link rel="stylesheet" href="/css/entry.css">',
                '    <style>',
                '        :root { --maxWidth: 67vw; }',
                '        .pa-meta { font-size: 0.8rem; font-weight: 600; color: #888; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 2rem; }',
                '        .pa-section { margin-bottom: 2rem; }',
                '        .pa-section h2 { font-size: 1rem; font-weight: 700; margin-bottom: 0.5rem; }',
                '    </style>',
                '    <title>' + title + '</title>',
                '</head>',
                '<body>',
                '  <button type="button" class="back-btn" onclick="history.back()">←</button>',
                '  <div class="entry-container">',
                '    <h1>' + title + '</h1>',
                '    <p class="pa-meta">' + tag + ' — ' + getDate() + '</p>',
                '    ' + mediaEl,
                '    <div class="entry-content">',
                '      <div class="pa-section"><h2>what it does</h2><p>' + what + '</p></div>',
                '      <div class="pa-section"><h2>how it works</h2><p>' + how + '</p></div>',
                '    </div>',
                '  </div>',
                '<' + '/body>',
                '<script src="/js/home.js"><' + '/script>',
                '<' + '/html>',
            ];
            return parts.join('\n');
        }

        async function uploadToGitHub(path, content, token, isBinary = false) {
            let encoded;
            if (isBinary) {
                encoded = content;
            } else {
                encoded = btoa(unescape(encodeURIComponent(content)));
            }

            let sha;
            const check = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/${path}`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            if (check.ok) {
                const existing = await check.json();
                sha = existing.sha;
            }

            return fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/${path}`, {
                method: 'PUT',
                headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    message: `powerapps: ${path}`,
                    content: encoded,
                    branch: BRANCH,
                    ...(sha && { sha }),
                })
            });
        }

        async function patchPaIndex(token, slug, title, tag, media) {
            const path = 'powerapps.json';
            const res = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/${path}`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            let entries = [], sha;
            if (res.ok) {
                const data = await res.json();
                sha = data.sha;
                entries = JSON.parse(atob(data.content.replace(/\n/g, '')));
            }
            const idx = entries.findIndex(e => e.slug === slug);
            const entry = { slug, title, tag, media };
            if (idx >= 0) entries[idx] = entry;
            else entries.push(entry);
            const encoded = btoa(unescape(encodeURIComponent(JSON.stringify(entries, null, 2))));
            await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/${path}`, {
                method: 'PUT',
                headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: `update powerapps index`, content: encoded, branch: BRANCH, ...(sha && { sha }) })
            });
        }

        document.getElementById('post-btn').addEventListener('click', async () => {
            const title = document.getElementById('pa-title').value.trim();
            if (!title) { document.getElementById('pa-title').focus(); return; }

            const token = getToken();
            if (!token) return;

            const btn = document.getElementById('post-btn');
            btn.textContent = 'posting...';

            try {
                const slug = slugify(title);
                const what = document.getElementById('pa-what').value;
                const how = document.getElementById('pa-how').value;
                let mediaSrcs = [];

                // upload all media files
                for (let i = 0; i < mediaFiles.length; i++) {
                    const file = mediaFiles[i];
                    const ext = file.type === 'video/mp4' ? 'mp4' : (file.name.split('.').pop() || 'jpg');
                    const filename = mediaFiles.length === 1 ? `${slug}.${ext}` : `${slug}-${i+1}.${ext}`;
                    const b64 = await new Promise(resolve => {
                        const r = new FileReader();
                        r.onload = e => resolve(e.target.result.split(',')[1]);
                        r.readAsDataURL(file);
                    });
                    await uploadToGitHub(`powerapps/${filename}`, b64, token, true);
                    mediaSrcs.push(`/powerapps/${filename}`);
                }

                // upload detail HTML
                const tagStr = [...selectedTags].join(', ');
                const html = buildDetailHTML(title, tagStr, what, how, mediaSrcs);
                await uploadToGitHub(`powerapps/${slug}.html`, html, token);

                // update powerapps.json index
                const mediaVal = mediaSrcs.length === 1 ? mediaSrcs[0] : mediaSrcs.length > 1 ? mediaSrcs : '';
                await patchPaIndex(token, slug, title, tagStr, mediaVal);

                btn.textContent = 'posted!';
                setTimeout(() => btn.textContent = 'post', 2000);
            } catch (e) {
                console.error(e);
                btn.textContent = 'error — check console';
                setTimeout(() => btn.textContent = 'post', 3000);
            }
        });
    </script>
</body>
</html>
